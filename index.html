function saveDivers(){
  const items=[];
  document.querySelectorAll('[id^="div-desc-"]').forEach(el=>{
    const i=el.id.split('-')[2];
    const desc=el.value.trim();
    const amt=parseFloat(document.getElementById('div-amt-'+i).value)||0;
    if(desc&&amt>0) items.push({desc,amt});
  });
  if(!items.length){showToast('⚠️ Remplissez au moins une dépense');return;}

  // Récupérer la villa sélectionnée dans le modal divers
  const villaSelect = document.getElementById('divers-villa-select');
  const villaName = villaSelect ? villaSelect.value : (CU&&CU.villas&&CU.villas[0]?CU.villas[0].name:'');

  closeMov();
  diversCount=0;

  const total=items.reduce((s,x)=>s+x.amt,0);

  // Chercher le dernier rapport de cette villa dans l'historique pour le mettre à jour
  const cid = CU.id || localStorage.getItem('acs_last_id');
  let rapportMisAJour = null;
  if(cid && CLIENTS[cid] && CLIENTS[cid].history){
    // Trouver le rapport le plus récent de cette villa
    const found = CLIENTS[cid].history.find(function(h){ return h.name===villaName; });
    if(found){
      // Ajouter les nouvelles dépenses au rapport
      if(!found.details) found.details = {villa:found.name,mois:found.period,rev:found.rev||0,deps:[],totalDep:found.dep||0,cp:found.com&&found.rev?Math.round(found.com/found.rev*100):20,com:found.com||0,net:found.net||0};
      if(!found.details.deps) found.details.deps=[];
      items.forEach(function(it){ found.details.deps.push({n:it.desc,v:it.amt}); });
      found.details.totalDep = (found.details.totalDep||0)+total;
      found.details.net = (found.details.rev||0)-(found.details.totalDep||0)-(found.details.com||0);
      found.net = found.details.net;
      found.dep = found.details.totalDep;
      // Sauvegarder
      save('clients',CLIENTS);
      rapportMisAJour = found.details;
      // Mettre à jour dans window._rapports
      const key='hist_'+(found.name+'_'+found.period).replace(/\s+/g,'_');
      window._rapports = window._rapports||{};
      window._rapports[key] = rapportMisAJour;
      if(found._rid) window._rapports[found._rid] = rapportMisAJour;
    }
  }

  // Afficher résultats dans une modale
  const ridNew='div_'+Date.now();
  window._rapports = window._rapports||{};
  if(rapportMisAJour) window._rapports[ridNew]=rapportMisAJour;

  let resHtml='<div class="rc"><div class="rct">⚡ Dépenses diverses — '+villaName+'</div>'
    +items.map(function(x){return '<div class="rr"><span>'+x.desc+'</span><span class="rn">−'+fmt(x.amt)+'</span></div>';}).join('')
    +'<div class="rr"><span>TOTAL DIVERS</span><span class="rn">−'+fmt(total)+'</span></div>';
  if(rapportMisAJour){
    resHtml+='<div class="rr" style="border-top:1px solid rgba(201,149,12,.2);margin-top:.3rem;padding-top:.3rem;">'
      +'<span style="color:var(--or3);font-weight:600;">Bénéfice net mis à jour</span>'
      +'<span style="color:'+(rapportMisAJour.net>=0?'#4ade80':'#f87171')+';font-weight:700;">'+(rapportMisAJour.net>=0?'+ ':'')+fmt(rapportMisAJour.net)+'</span></div>';
    resHtml+='<div class="rb"><button class="rbtn g" onclick="genPDF(this,\''+ridNew+'\')" style="width:100%;border-radius:6px;">📄 Télécharger PDF mis à jour</button></div>';
  }
  resHtml+='</div>';

  document.getElementById('modalbody').innerHTML=
    '<div class="mh"></div>'
    +'<div style="text-align:center;margin-bottom:1rem;">'
      +'<div style="font-size:2rem;margin-bottom:.4rem;">✅</div>'
      +'<div style="font-family:Cormorant Garamond,serif;font-size:1.2rem;color:var(--or3);">Dépenses enregistrées</div>'
      +'<div style="font-size:.72rem;color:var(--gris);margin-top:.2rem;">'+fmt(total)+' déduits du rapport</div>'
    +'</div>'
    + resHtml
    +'<button class="cancel-btn" onclick="closeMov()">Fermer</button>';
  document.getElementById('modal').classList.add('open');
  buildClient();
}

let swReg = null;

function initNotifications(){
  if(!('serviceWorker' in navigator) || !('Notification' in window)) return;
  navigator.serviceWorker.register('./sw.js').then(reg => {
    swReg = reg;
    console.log('[ACS] Service Worker enregistré');
    if(Notification.permission === 'granted') {
      sendScheduleToSW();
    } else if(Notification.permission === 'default') {
      setTimeout(() => {
        Notification.requestPermission().then(p => {
          if(p === 'granted') sendScheduleToSW();
        });
      }, 2500);
    }
  }).catch(e => console.log('[ACS] SW error:', e));
}

function sendScheduleToSW() {
  const villas = CU && CU.villas ? CU.villas.map(v => v.name) : [];
  navigator.serviceWorker.ready.then(reg => {
    reg.active && reg.active.postMessage({
      type: 'SCHEDULE_19H',
      villaNames: villas,
      userName: CU ? CU.name : ''
    });
  });
}

function testNotif(){
  if(!('serviceWorker' in navigator)){showToast('❌ Non supporté sur ce navigateur');return;}
  if(Notification.permission === 'granted'){
    const villas = CU && CU.villas ? CU.villas.map(v => v.name) : ['votre villa'];
    navigator.serviceWorker.ready.then(reg => {
      reg.active && reg.active.postMessage({
        type: 'TEST_NOTIF',
        villaNames: villas,
        userName: CU ? CU.name : ''
      });
    });
    showToast('🔔 Notification test envoyée !');
  } else if(Notification.permission === 'default'){
    Notification.requestPermission().then(p => {
      if(p === 'granted'){ sendScheduleToSW(); showToast('✅ Notifications activées !'); }
      else showToast('❌ Notifications refusées — activez dans les réglages');
    });
  } else {
    showToast('❌ Bloquées — activez dans Réglages > Safari/Chrome > Notifications');
  }
}

        } else {

      } else if (!ADMINS[sid]) {
        // Le client n'existe plus — session invalide, forcer logout
        try { sessionStorage.removeItem('acs_session'); } catch(e) {}
      }
    }

    // Essayer Firebase d'abord pour avoir les données les plus récentes
    if (_fbdb) {

})();

          <div style="font-size:.7rem;color:var(--gris);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.5rem;">Votre nouveau PIN</div>
          <div style="font-family:Cormorant Garamond,serif;font-size:3rem;font-weight:700;color:var(--or3);letter-spacing:.5em;">${newPin}</div>
          <div style="font-size:.7rem;color:var(--gris);margin-top:.4rem;">Notez-le et changez-le dès la connexion</div>
        </div>
        <button class="save-btn" onclick="applyNewPin('${id}','${newPin}')">✓ Appliquer ce PIN</button>
      ` : `
        <div style="font-size:.78rem;color:var(--gris);margin-bottom:1.2rem;line-height:1.5;">
          Aucun email enregistré pour ce compte.<br>Contactez votre gestionnaire ACS.
        </div>
        <div style="margin-bottom:1rem;">
          <div style="font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gris);margin-bottom:.35rem;text-align:left;">Entrez votre email</div>
          <input id="rp-email" type="email" placeholder="votre@email.com" class="form-input" />
        </div>
        <button class="save-btn" onclick="resetPinWithEmail('${id}','${newPin}')">Réinitialiser</button>
      `}
      <button class="cancel-btn" onclick="closeMov()">Annuler</button>
    </div>`;
  document.getElementById('modal').classList.add('open');
}

function applyNewPin(id, newPin) {
  CLIENTS = load('clients', DEFAULT_CLIENTS);
  if(id && CLIENTS[id]) {
    CLIENTS[id].pin = String(newPin);
    save('clients', CLIENTS);
    // Effacer la session pour forcer reconnexion
    try{ sessionStorage.removeItem('acs_session'); }catch(e){}
    closeMov();
    showToast('✅ PIN changé — Connectez-vous avec votre nouveau PIN');
    pin=''; updDots();
  } else {
    closeMov();
    showToast('❌ Impossible de modifier — contactez ACS');
  }
}

function resetPinWithEmail(id, newPin) {
  const email = document.getElementById('rp-email').value.trim();
  if(!email || !email.includes('@')) { showToast('⚠️ Email invalide'); return; }
  try { localStorage.setItem('acs_email_'+id, email); } catch(e) {}
  if(CLIENTS[id]) { CLIENTS[id].email = email; CLIENTS[id].pin = newPin; save('clients', CLIENTS); }
  closeMov();
  showToast('✅ PIN réinitialisé — Reconnectez-vous');
  pin=''; updDots();
}

function clearSavedId(){
  try{localStorage.removeItem('acs_last_id');}catch(e){}
  document.getElementById('lid').value='';
  // Restore the login field and remove the saved user hint
  var lidEl=document.getElementById('lid');
  var labelEl=lidEl?lidEl.previousElementSibling:null;
  if(lidEl)lidEl.style.display='';
  if(labelEl&&labelEl.classList.contains('fl'))labelEl.style.display='';
  // Remove the "Pas vous?" hint
  var hints=document.querySelectorAll('#login .lw div');
  hints.forEach(function(h){if(h.textContent.indexOf('Pas vous')!==-1)h.remove();});
  location.reload();
}

// ══ SETUP LINK — cross-device client onboarding ══
function generateSetupLink(clientId){
  CLIENTS = load('clients', DEFAULT_CLIENTS);
  const c = CLIENTS[clientId];
  if(!c){ alert('Client introuvable.'); return; }
  // Encode minimal data — PAS de PIN (sécurité)
  // Le client devra entrer son PIN sur le nouvel appareil
  const payload = {
    id: clientId,
    name: c.name,
    initials: c.initials,
    plan: c.plan || 'ACS',
    role: 'client',
    v: 2 // version du payload (sans PIN)
  };
  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
  const url = location.origin + location.pathname + '#setup=' + encoded;
  // Copy to clipboard and show the link
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(function(){
      showSetupLinkModal(url, true);
    }).catch(function(){ showSetupLinkModal(url, false); });
  } else {
    showSetupLinkModal(url, false);
  }
}

function showSetupLinkModal(url, copied){
  document.getElementById('modalbody').innerHTML = `
    <div class="mh"></div>
    <div style="font-family:Cormorant Garamond,serif;font-size:1.25rem;color:var(--or3);font-weight:700;margin-bottom:.5rem;">📲 Lien de connexion</div>
    <div style="font-size:.75rem;color:var(--gris);margin-bottom:1rem;">Envoyez ce lien au client. En l'ouvrant, son compte sera automatiquement importé sur son appareil.</div>
    <textarea id="setup-link-txt" readonly style="width:100%;height:80px;background:var(--fond2);border:1px solid var(--gris2);border-radius:8px;color:var(--txt);font-size:.65rem;padding:.5rem;resize:none;word-break:break-all;">${url}</textarea>
    ${copied ? '<div style="color:#4ade80;font-size:.72rem;margin-top:.4rem;">✓ Copié dans le presse-papiers</div>' : ''}
    <div style="display:flex;gap:.6rem;margin-top:1rem;">
      <button class="cb v" style="flex:1;" onclick="(function(){var t=document.getElementById('setup-link-txt');t.select();try{document.execCommand('copy');}catch(e){}})()">Copier</button>
      <button class="cancel-btn" style="flex:1;" onclick="closeMov()">Fermer</button>
    </div>
  `;
  document.getElementById('modal').classList.add('open');
}

// ══ DÉTECTION DU LIEN SETUP AU CHARGEMENT ══
(function(){
  try {
    var hash = location.hash;
    if(!hash || hash.indexOf('#setup=') !== 0) return;
    var encoded = hash.slice(7);
    var payload;
    try { payload = JSON.parse(decodeURIComponent(escape(atob(encoded)))); } catch(e){ return; }
    if(!payload || !payload.id) return;

    // v2: le lien ne contient plus le PIN — juste l'identifiant
    // Les données du client seront chargées depuis Firebase lors du login
    // Pour le mode offline, synchroniser depuis Firebase si possible
    if (_fbdb) {
      fbLoad('clients').then(function(fbClients) {
        if (fbClients && fbClients[payload.id]) {
          // Importer les données complètes depuis Firebase
          var clients = load('clients', {});
          clients[payload.id] = fbClients[payload.id];
          try { localStorage.setItem('acs_clients', JSON.stringify(clients)); } catch(e) {}
          CLIENTS = clients;
        }
      });
    }

    // Si payload v1 (ancien format avec PIN) — migration
    if (payload.pin && payload.v !== 2) {
      var clients = load('clients', {});
      if (!clients[payload.id]) {
        clients[payload.id] = {
          pin: payload.pin,
          name: payload.name || payload.id,
          initials: payload.initials || payload.id.slice(0,2).toUpperCase(),
          plan: payload.plan || 'ACS',
          role: 'client',
          villas: payload.villas || [],
          aboEnd: payload.aboEnd || null,
          history: []
        };
        save('clients', clients);
        CLIENTS = clients;
      }
    }

    history.replaceState(null,'',location.pathname);
    document.addEventListener('DOMContentLoaded', function(){
      var lidEl = document.getElementById('lid');
      if(lidEl){ lidEl.value = payload.id; }
      var banner = document.createElement('div');
      banner.style.cssText = 'position:fixed;top:1rem;left:50%;transform:translateX(-50%);background:var(--or3);color:#080808;padding:.5rem 1.2rem;border-radius:20px;font-size:.78rem;font-weight:700;z-index:9999;';
      banner.textContent = '✓ Compte trouvé — entrez votre PIN pour vous connecter';
      document.body.appendChild(banner);
      setTimeout(function(){ banner.remove(); }, 4000);
    });
  } catch(e){ console.log('[ACS] setup link error:', e); }
})();

// Init page display
goPage('dash');
</script>
