<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="ACS">
<title>ACS — Accounting Concierge</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --noir:#080808;--noir2:#121212;--noir3:#1c1c1c;--noir4:#242424;
  --or:#C9950C;--or2:#E8B84B;--or3:#F5D06B;
  --blanc:#f8f6f0;--gris:#777;--gris2:#2a2a2a;--gris3:#444;
  --vert:#16a34a;--rouge:#dc2626;--violet:#7c3aed;
  --r:10px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;}
body{font-family:'DM Sans',sans-serif;background:var(--noir);color:var(--blanc);height:100vh;height:100dvh;overflow:hidden;}
.screen{display:none;flex-direction:column;height:100vh;height:100dvh;}
.screen.active{display:flex;}

/* LOGIN */
#login{align-items:center;justify-content:center;position:relative;overflow:hidden;}
#login::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(201,149,12,.1) 0%,transparent 70%);top:-80px;right:-80px;pointer-events:none;z-index:0;}
.lw{width:100%;max-width:320px;padding:2rem;z-index:10;position:relative;}
.ll{font-family:'Cormorant Garamond',serif;font-size:4rem;font-weight:700;color:var(--or3);letter-spacing:.15em;text-align:center;line-height:1;animation:fD .6s ease both;}
.lt{text-align:center;font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gris);margin:.3rem 0 .6rem;animation:fD .6s .1s ease both;opacity:0;animation-fill-mode:both;}
.ld{width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--or),transparent);margin:.5rem auto 1.8rem;animation:fD .6s .2s ease both;opacity:0;animation-fill-mode:both;}
@keyframes fD{from{opacity:0;transform:translateY(-14px);}to{opacity:1;transform:translateY(0);}}
@keyframes fU{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes fI{from{opacity:0;}to{opacity:1;}}
.fl{font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--gris);margin-bottom:.35rem;}
.fi{width:100%;background:var(--noir2);border:1px solid var(--gris2);color:var(--blanc);font-family:'DM Sans',sans-serif;font-size:.9rem;padding:.75rem .9rem;border-radius:var(--r);outline:none;transition:border-color .2s;margin-bottom:1.1rem;animation:fU .6s .3s ease both;opacity:0;animation-fill-mode:both;}
.fi:focus{border-color:var(--or);}
.fi::placeholder{color:var(--gris3);}
.ps{animation:fU .6s .35s ease both;opacity:0;animation-fill-mode:both;}
.pd{display:flex;justify-content:center;gap:.7rem;margin-bottom:1.6rem;}
.dot{width:13px;height:13px;border-radius:50%;border:2px solid var(--gris3);transition:all .18s;}
.dot.on{background:var(--or3);border-color:var(--or3);transform:scale(1.1);}
.dot.err{background:var(--rouge);border-color:var(--rouge);}
.dot.ok{background:var(--vert);border-color:var(--vert);}
.pg{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;max-width:240px;margin:0 auto;}
.pk{background:var(--noir2);border:1px solid var(--gris2);color:var(--blanc);font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;padding:.85rem;border-radius:var(--r);cursor:pointer;text-align:center;transition:all .15s;user-select:none;}
.pk:active{background:var(--noir3);border-color:var(--or);color:var(--or3);transform:scale(.93);}
.pk.del{font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--gris);}
.pk.z{grid-column:2;}
.lh{text-align:center;font-size:.68rem;color:var(--gris);margin-top:1.3rem;animation:fI .6s .6s both;line-height:1.6;}
.lh strong{color:var(--or3);}
@keyframes shake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-5px);}40%,80%{transform:translateX(5px);}}
.shake{animation:shake .35s ease;}

/* TOPBAR */
.tb{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.1rem;background:var(--noir2);border-bottom:1px solid var(--gris2);flex-shrink:0;position:relative;z-index:10;}
.tb::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--or),transparent);opacity:.35;}
.tl{font-family:'Cormorant Garamond',serif;font-size:1.65rem;font-weight:700;color:var(--or3);letter-spacing:.1em;}
.tr{display:flex;align-items:center;gap:.6rem;}
.av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--or),var(--or3));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.72rem;color:var(--noir);cursor:pointer;flex-shrink:0;}
.av.adm{background:linear-gradient(135deg,var(--violet),#a855f7);}
.nb{background:none;border:none;color:var(--gris);font-size:1rem;cursor:pointer;position:relative;padding:.2rem;}
.nd{position:absolute;top:0;right:0;width:6px;height:6px;border-radius:50%;background:var(--or);border:1px solid var(--noir2);}

/* NAV */
.nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--noir2);border-top:1px solid var(--gris2);z-index:100;}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:.55rem 0;cursor:pointer;color:var(--gris);transition:color .2s;border:none;background:none;position:relative;}
.ni.on{color:var(--or3);}
.ni.on::before{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:linear-gradient(90deg,transparent,var(--or3),transparent);}
.ni svg{width:18px;height:18px;margin-bottom:2px;}
.ni span{font-size:.52rem;letter-spacing:.05em;text-transform:uppercase;}

/* CONTENT */
.ct{flex:1;overflow-y:auto;padding:1rem 1rem 5.5rem;-webkit-overflow-scrolling:touch;}
.ct::-webkit-scrollbar{width:0;}

/* TYPOGRAPHY */
.h1{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:600;color:var(--or3);line-height:1.1;}
.sub{font-size:.75rem;color:var(--gris);margin-top:.15rem;margin-bottom:1.3rem;}
.sh{font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gris);margin-bottom:.65rem;display:flex;align-items:center;gap:.4rem;}
.sh::after{content:'';flex:1;height:1px;background:var(--gris2);}

/* KPI */
.kr{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:1.2rem;}
.kc{background:var(--noir2);border:1px solid var(--gris2);border-radius:var(--r);padding:.85rem;position:relative;overflow:hidden;}
.kc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--or),var(--or3));}
.kl{font-size:.58rem;color:var(--gris);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.25rem;}
.kv{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;color:var(--or3);}
.kd{font-size:.65rem;color:var(--gris);margin-top:.1rem;}
.kd.up{color:#4ade80;}

/* CARDS */
.vc{background:var(--noir2);border:1px solid var(--gris2);border-radius:var(--r);padding:.85rem .95rem;margin-bottom:.65rem;cursor:pointer;transition:transform .15s,border-color .2s;border-left:3px solid transparent;}
.vc:active{transform:scale(.985);}
.vc.pos{border-left-color:var(--vert);}
.vc.neg{border-left-color:var(--rouge);}
.vt{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.45rem;}
.vn{font-weight:600;font-size:.92rem;}
.vp{font-size:.65rem;color:var(--gris);margin-top:1px;}
.vnet{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;}
.vnet.pos{color:#4ade80;}
.vnet.neg{color:#f87171;}
.chips{display:flex;gap:.4rem;flex-wrap:wrap;}
.chip{font-size:.6rem;color:var(--gris);background:var(--noir3);padding:2px 6px;border-radius:20px;}
.chip span{color:var(--blanc);font-weight:500;}
.vbars{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.35rem;margin-top:.55rem;}
.bl2{font-size:.56rem;color:var(--gris);margin-bottom:2px;}
.bt2{height:3px;background:var(--gris2);border-radius:2px;overflow:hidden;}
.bf{height:100%;border-radius:2px;}
.bf.r{background:var(--or);}
.bf.d{background:#ef4444;}
.bf.n{background:#4ade80;}

/* QUICK BTN */
.qb{display:flex;align-items:center;gap:.85rem;background:linear-gradient(135deg,rgba(201,149,12,.1),rgba(201,149,12,.04));border:1px solid rgba(201,149,12,.35);border-radius:var(--r);padding:.9rem 1rem;margin-bottom:1.2rem;cursor:pointer;transition:opacity .2s;}
.qb:active{opacity:.75;}
.qi{width:40px;height:40px;border-radius:8px;background:linear-gradient(135deg,var(--or),var(--or3));display:flex;align-items:center;justify-content:center;font-size:1.15rem;flex-shrink:0;}
.qt strong{display:block;font-size:.88rem;color:var(--blanc);}
.qt small{font-size:.7rem;color:var(--gris);}
.qa{margin-left:auto;color:var(--or);font-size:1.2rem;}

/* ADMIN */
.abadge{display:inline-flex;align-items:center;gap:.3rem;padding:.22rem .65rem;background:rgba(124,58,237,.12);border:1px solid rgba(168,85,247,.35);border-radius:20px;font-size:.65rem;color:#c084fc;margin-bottom:1.1rem;}
.ak3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.55rem;margin-bottom:1.2rem;}
.ak{background:var(--noir2);border:1px solid var(--gris2);border-radius:var(--r);padding:.7rem .5rem;text-align:center;}
.akv{font-family:'Cormorant Garamond',serif;font-size:1.45rem;font-weight:700;color:var(--or3);}
.akl{font-size:.55rem;color:var(--gris);letter-spacing:.08em;text-transform:uppercase;margin-top:1px;}
.cc{background:var(--noir2);border:1px solid var(--gris2);border-radius:var(--r);padding:.85rem .95rem;margin-bottom:.65rem;}
.cct{display:flex;justify-content:space-between;align-items:center;margin-bottom:.45rem;}
.ccn{font-weight:600;font-size:.92rem;}
.ccp{font-size:.6rem;padding:.18rem .55rem;border-radius:20px;font-weight:500;}
.ccp.b{background:rgba(201,149,12,.12);color:var(--or3);border:1px solid rgba(201,149,12,.3);}
.ccp.s{background:rgba(29,78,216,.12);color:#93c5fd;border:1px solid rgba(29,78,216,.3);}
.ccp.p{background:rgba(124,58,237,.12);color:#c084fc;border:1px solid rgba(124,58,237,.3);}
.ccs{display:flex;gap:.7rem;margin-bottom:.6rem;}
.cst{font-size:.68rem;color:var(--gris);}
.cst span{color:var(--blanc);font-weight:500;}
.cca{display:flex;gap:.4rem;}
.cb{flex:1;padding:.42rem;border-radius:6px;font-size:.65rem;font-weight:600;cursor:pointer;border:none;text-align:center;transition:opacity .2s;}
.cb:active{opacity:.8;}
.cb.v{background:var(--gris2);color:var(--blanc);}
.cb.m{background:rgba(201,149,12,.12);color:var(--or3);border:1px solid rgba(201,149,12,.3);}
.cb.r2{background:linear-gradient(135deg,var(--or),var(--or3));color:var(--noir);}
.cb.del{background:rgba(220,38,38,.1);color:#f87171;border:1px solid rgba(220,38,38,.25);}

/* ADD CLIENT BTN */
.add-btn{display:flex;align-items:center;justify-content:center;gap:.5rem;width:100%;padding:.85rem;background:transparent;border:1px dashed rgba(201,149,12,.4);border-radius:var(--r);color:var(--or3);font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .2s;margin-top:.3rem;}
.add-btn:active{background:rgba(201,149,12,.08);}

/* RAPPORT CARD (utilisée dans les modales résultats) */
.rc{background:var(--noir3);border:1px solid var(--or);border-radius:8px;padding:.7rem;margin-top:.35rem;}
.rct{font-size:.72rem;font-weight:600;color:var(--or3);margin-bottom:.35rem;}
.rr{display:flex;justify-content:space-between;font-size:.73rem;padding:2px 0;border-bottom:1px solid var(--gris2);}
.rr:last-of-type{border:none;font-weight:700;color:var(--or3);}
.rn{color:#f87171;}
.rb{display:flex;gap:.35rem;margin-top:.55rem;}
.rbtn{flex:1;padding:.4rem;border-radius:5px;font-size:.65rem;font-weight:600;cursor:pointer;border:none;}
.rbtn.g{background:linear-gradient(135deg,var(--or),var(--or3));color:var(--noir);}
.rbtn.s{background:var(--gris2);color:var(--blanc);}

/* HISTORIQUE */
.mg{margin-bottom:1.3rem;}
.ml{font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gris);margin-bottom:.55rem;display:flex;align-items:center;gap:.4rem;}
.ml::after{content:'';flex:1;height:1px;background:var(--gris2);}
.hi{display:flex;align-items:center;gap:.75rem;background:var(--noir2);border:1px solid var(--gris2);border-radius:var(--r);padding:.75rem .85rem;margin-bottom:.45rem;cursor:pointer;}
.hi:active{border-color:var(--or);}
.hico{width:34px;height:34px;border-radius:7px;background:rgba(201,149,12,.08);border:1px solid rgba(201,149,12,.25);display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0;}
.hin{font-size:.85rem;font-weight:600;margin-bottom:1px;}
.him{font-size:.65rem;color:var(--gris);}
.hr2{text-align:right;}
.ha{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;}
.ft{display:inline-block;padding:1px 5px;background:var(--gris2);border-radius:3px;font-size:.55rem;margin-right:2px;color:var(--gris);}

/* MESSAGES */
.th{display:flex;align-items:center;gap:.75rem;padding:.85rem 1rem;border-bottom:1px solid var(--gris2);cursor:pointer;}
.th:active{background:var(--noir2);}
.tav{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;color:var(--noir);flex-shrink:0;position:relative;}
.tod{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;background:#4ade80;border:2px solid var(--noir);}
.ti{flex:1;min-width:0;}
.tn{font-size:.88rem;font-weight:600;margin-bottom:2px;}
.tp{font-size:.73rem;color:var(--gris);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tm{text-align:right;flex-shrink:0;}
.tt{font-size:.63rem;color:var(--gris);margin-bottom:3px;}
.tbadge{display:inline-flex;align-items:center;justify-content:center;min-width:17px;height:17px;border-radius:9px;background:var(--or);color:var(--noir);font-size:.6rem;font-weight:700;padding:0 3px;}


/* PROFIL */
.ph{text-align:center;padding:1.7rem 1rem 1.2rem;background:var(--noir2);border-bottom:1px solid var(--gris2);margin:-1rem -1rem 1.2rem;}
.pav{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;color:var(--noir);margin:0 auto .65rem;}
.pn{font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:600;color:var(--or3);}
.pr{font-size:.73rem;color:var(--gris);margin-top:.15rem;}
.pp{display:inline-flex;align-items:center;gap:.3rem;margin-top:.65rem;padding:.22rem .75rem;background:rgba(201,149,12,.08);border:1px solid rgba(201,149,12,.25);border-radius:20px;font-size:.7rem;color:var(--or3);}
.mi{display:flex;align-items:center;gap:.8rem;padding:.8rem 0;border-bottom:1px solid var(--gris2);cursor:pointer;}
.mii{width:32px;height:32px;border-radius:7px;background:var(--noir2);display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;}
.mit{flex:1;}
.miT{font-size:.86rem;font-weight:500;}
.miD{font-size:.68rem;color:var(--gris);margin-top:1px;}
.lob{width:100%;padding:.82rem;background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.25);color:#f87171;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;letter-spacing:.1em;border-radius:var(--r);cursor:pointer;margin-top:.9rem;}

/* MODAL */
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:300;align-items:flex-end;}
.mov.open{display:flex;}
.ms{background:var(--noir2);border-radius:14px 14px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:1.2rem 1rem 2.5rem;animation:sU .25s ease;}
@keyframes sU{from{transform:translateY(100%);}to{transform:translateY(0);}}
.mh{width:28px;height:3px;border-radius:2px;background:var(--gris2);margin:0 auto .9rem;}
.mt2{font-family:'Cormorant Garamond',serif;font-size:1.45rem;color:var(--or3);margin-bottom:.15rem;}
.mp{font-size:.73rem;color:var(--gris);margin-bottom:1rem;}
.ds{margin-bottom:.85rem;}
.dh{display:flex;justify-content:space-between;padding:.42rem .75rem;background:var(--noir3);border-radius:5px;font-size:.76rem;font-weight:600;color:var(--or3);margin-bottom:.18rem;}
.dr{display:flex;justify-content:space-between;padding:.3rem .75rem;font-size:.78rem;border-bottom:1px solid var(--gris2);}
.dr:last-child{border:none;}
.dr .v{color:var(--blanc);}
.nb2{display:flex;justify-content:space-between;align-items:center;padding:.85rem .95rem;border-radius:var(--r);margin:.9rem 0;}
.nb2.pos{background:rgba(22,163,74,.08);border:1px solid rgba(22,163,74,.25);}
.nb2.neg{background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.25);}
.nl{font-size:.75rem;font-weight:600;}
.na{font-family:'Cormorant Garamond',serif;font-size:1.85rem;font-weight:700;}
.nb2.pos .na{color:#4ade80;}
.nb2.neg .na{color:#f87171;}
.mbs{display:flex;gap:.65rem;margin-top:.9rem;}
.mb{flex:1;padding:.78rem;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:600;letter-spacing:.05em;cursor:pointer;border:none;}
.mb:active{opacity:.8;}
.mb.g{background:linear-gradient(135deg,var(--or),var(--or3));color:var(--noir);}
.mb.o{background:transparent;border:1px solid var(--gris2);color:var(--blanc);}

/* ADD CLIENT MODAL */
.form-group{margin-bottom:.9rem;}
.form-label{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gris);margin-bottom:.35rem;display:block;}
.form-input{width:100%;background:var(--noir3);border:1px solid var(--gris2);color:var(--blanc);font-family:'DM Sans',sans-serif;font-size:.88rem;padding:.7rem .85rem;border-radius:var(--r);outline:none;transition:border-color .2s;}
.form-input:focus{border-color:var(--or);}
.form-input::placeholder{color:var(--gris3);}
.form-select{width:100%;background:var(--noir3);border:1px solid var(--gris2);color:var(--blanc);font-family:'DM Sans',sans-serif;font-size:.88rem;padding:.7rem .85rem;border-radius:var(--r);outline:none;appearance:none;cursor:pointer;}
.form-select:focus{border-color:var(--or);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;}
.save-btn{width:100%;padding:.85rem;background:linear-gradient(135deg,var(--or),var(--or3));color:var(--noir);font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:700;letter-spacing:.1em;border:none;border-radius:var(--r);cursor:pointer;margin-top:.5rem;}
.save-btn:active{opacity:.85;}
.cancel-btn{width:100%;padding:.7rem;background:transparent;border:1px solid var(--gris2);color:var(--gris);font-family:'DM Sans',sans-serif;font-size:.8rem;border-radius:var(--r);cursor:pointer;margin-top:.4rem;}
.delete-zone{background:rgba(220,38,38,.06);border:1px solid rgba(220,38,38,.2);border-radius:var(--r);padding:.8rem;margin-top:1rem;}
.delete-zone-title{font-size:.7rem;font-weight:600;color:#f87171;margin-bottom:.5rem;}
.del-btn{width:100%;padding:.65rem;background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.3);color:#f87171;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:600;border-radius:6px;cursor:pointer;}
.pin-display{display:flex;justify-content:center;gap:.5rem;margin:.4rem 0 .6rem;}
.pin-circle{width:38px;height:38px;border-radius:50%;background:var(--noir3);border:2px solid var(--gris2);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:700;color:var(--or3);}

/* TOAST */
.plat-chip{padding:.35rem .75rem;border-radius:20px;font-size:.72rem;background:var(--noir3);border:1px solid var(--gris2);color:var(--gris);cursor:pointer;transition:all .2s;}
.plat-chip.on{background:rgba(201,149,12,.15);border-color:var(--or);color:var(--or3);}
.charge-row{display:flex;align-items:center;gap:.7rem;margin-bottom:.6rem;}
.charge-name{font-size:.8rem;color:var(--blanc);width:120px;flex-shrink:0;}
.charge-input{flex:1;}

<script>
// ═══════════════════════════════════════════════════════════════════
// ══ FIREBASE — CONFIGURATION                                    ══
// ═══════════════════════════════════════════════════════════════════
// ⚠️ INSTRUCTIONS POUR ACTIVER LA SYNCHRONISATION TEMPS RÉEL :
// 1. Allez sur https://console.firebase.google.com
// 2. Créez un nouveau projet (gratuit)

// 7. Règles de sécurité recommandées pour votre Realtime Database :
//    {

//    ⚠️ En production, restreignez l'accès avec Firebase Auth
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDzzfYXm-yVArtPvcIhF1YatYIMh87AFmA",
  authDomain: "acs-2ec55.firebaseapp.com",
  databaseURL: "https://acs-2ec55-default-rtdb.firebaseio.com",
  projectId: "acs-2ec55",
  storageBucket: "acs-2ec55.firebasestorage.app",
  messagingSenderId: "27745615499",
  appId: "1:27745615499:web:f468def5770433b35d5e8e"
};

// ══ FIREBASE INIT ══
var _fbdb = null;
var _fbConnected = false;
var _fbReady = false;
var _fbListeners = {};
var _fbSyncCallbacks = [];

function fbInit() {
  if (!FIREBASE_CONFIG.databaseURL || !FIREBASE_CONFIG.apiKey) {
    console.warn('[ACS] Firebase non configuré — mode localStorage uniquement');
    return false;
  }
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    _fbdb = firebase.database();
    _fbdb.ref('.info/connected').on('value', function(snap) {
      _fbConnected = snap.val() === true;
      updateConnectionUI();
    });
    _fbReady = true;
    console.log('[ACS] Firebase initialisé');
    return true;
  } catch(e) {
    console.error('[ACS] Firebase init error:', e);
    return false;
  }
}

// ══ STORAGE — Firebase (source de vérité) + localStorage (cache offline) ══
function save(k, v) {
  // 1. Cache local immédiat
  try { localStorage.setItem('acs_' + k, JSON.stringify(v)); } catch(e) {}
  // 2. Écriture Firebase (sync cross-device)
  if (_fbdb) {
    _fbdb.ref('data/' + k).set(v).catch(function(e) {
      console.warn('[ACS] Firebase write error on ' + k + ':', e);
    });
  }
}

function load(k, def) {
  try {
    var v = localStorage.getItem('acs_' + k);
    return v ? JSON.parse(v) : def;
  } catch(e) { return def; }
}

// Charger depuis Firebase (async, pour validation login etc.)
function fbLoad(k) {
  if (!_fbdb) return Promise.resolve(undefined);
  return _fbdb.ref('data/' + k).once('value').then(function(snap) {
    var val = snap.val();
    if (val !== null && val !== undefined) {
      try { localStorage.setItem('acs_' + k, JSON.stringify(val)); } catch(e) {}
    }
    return val;
  }).catch(function(e) {
    console.warn('[ACS] Firebase read error:', e);
    return undefined;
  });
}

// Synchronisation initiale : Firebase → localStorage
function fbSyncAll() {
  if (!_fbdb) return Promise.resolve();
  return _fbdb.ref('data').once('value').then(function(snap) {
    var data = snap.val();
    if (!data) {
      // Premier lancement : pousser les données locales vers Firebase
      var clients = load('clients', {});
      var messages = load('messages', []);
      var friends = load('friends', {});
      var pushData = {};
      if (Object.keys(clients).length > 0) pushData['data/clients'] = clients;
      if (messages.length > 0) pushData['data/messages'] = messages;
      if (Object.keys(friends).length > 0) pushData['data/friends'] = friends;
      if (Object.keys(pushData).length > 0) {
        return _fbdb.ref().update(pushData).then(function() {
          console.log('[ACS] Données locales poussées vers Firebase');
        });
      }
    } else {
      // Sync Firebase → local
      Object.keys(data).forEach(function(k) {
        try { localStorage.setItem('acs_' + k, JSON.stringify(data[k])); } catch(e) {}
      });
      console.log('[ACS] Données Firebase synchronisées localement');
    }
  }).catch(function(e) {
    console.warn('[ACS] Sync initial error:', e);
  });
}

// Listeners temps réel — met à jour localStorage + UI automatiquement
function fbStartListeners() {
  if (!_fbdb) return;

  // Listener sur les clients
  _fbdb.ref('data/clients').on('value', function(snap) {
    var val = snap.val();
    if (val === null) val = {};
    try { localStorage.setItem('acs_clients', JSON.stringify(val)); } catch(e) {}
    CLIENTS = val;

    // Si utilisateur connecté, vérifier qu'il existe toujours
    if (CU && CU.role !== 'admin' && CU.id) {
      if (!CLIENTS[CU.id]) {
        // Client supprimé → déconnexion forcée
        showToast('⚠️ Votre compte a été supprimé par l\'administrateur');
        setTimeout(doLogout, 2000);
        return;
      }
      // Mettre à jour les données de l'utilisateur connecté
      CU = Object.assign({}, CLIENTS[CU.id], {id: CU.id});
    }

    // Rafraîchir l'interface si connecté
    if (CU) {
      if (CU.role === 'admin') buildAdmin();
      else buildClient();
      buildProfile();
    }
  });

  // Listener sur les messages
  _fbdb.ref('data/messages').on('value', function(snap) {
    var val = snap.val();
    if (val === null) val = [];
    // Firebase peut transformer les arrays en objects — reconvertir
    if (val && typeof val === 'object' && !Array.isArray(val)) {
      val = Object.values(val);
    }
    try { localStorage.setItem('acs_messages', JSON.stringify(val)); } catch(e) {}
    // Rafraîchir les threads
    if (CU) buildThreads();
  });

  // Listener sur les amis
  _fbdb.ref('data/friends').on('value', function(snap) {
    var val = snap.val();
    if (val === null) val = {};
    try { localStorage.setItem('acs_friends', JSON.stringify(val)); } catch(e) {}
    if (CU) buildThreads();
  });
}

// Indicateur de connexion dans le topbar
function updateConnectionUI() {
  var el = document.getElementById('conn-status');
  if (!el) return;
  if (_fbConnected) {
    el.style.background = '#4ade80';
    el.title = 'Connecté — synchronisé';
  } else if (_fbReady) {
    el.style.background = '#f87171';
    el.title = 'Hors-ligne — modifications locales';
  } else {
    el.style.background = 'var(--gris3)';
    el.title = 'Firebase non configuré';
  }
}

// ══ DEFAULT DATA ══
const DEFAULT_CLIENTS = {};

// Load or init clients
let CLIENTS = load('clients', DEFAULT_CLIENTS);

// Initialiser Firebase au chargement
fbInit();
// Sync initiale (non bloquante)
if (_fbReady) {
  fbSyncAll().then(function() {
    CLIENTS = load('clients', DEFAULT_CLIENTS);
  });
}

// Plusieurs comptes admin — clé = identifiant de connexion
const ADMINS = {
  'admin': {pin:'0000', role:'admin', name:'Alexis B.', initials:'AB', plan:'Admin', id:'admin'},
  'eddy':  {pin:'0000', role:'admin', name:'Eddy',      initials:'ED', plan:'Admin', id:'eddy'}
};
// Alias rétrocompatibilité
const ADMIN = ADMINS['admin'];

let CU=null;

// ══ PIN ══
// pk, pdel, updDots déclarés en haut du document
var _loginAttempts = 0;
var _loginLockUntil = 0;

function tryLogin(){
  // Rate limiting — protection brute force
  if (Date.now() < _loginLockUntil) {
    var _remaining = Math.ceil((_loginLockUntil - Date.now()) / 1000);
    showToast('🔒 Trop de tentatives. Réessayez dans ' + _remaining + 's');
    pin = ''; updDots();
    return;
  }

  const id=document.getElementById('lid').value.trim().toLowerCase();
  if(!id){
    for(let i=0;i<4;i++)document.getElementById('d'+i).className='dot err';
    document.getElementById('pgrid').classList.add('shake');
    setTimeout(()=>{pin='';updDots();document.getElementById('pgrid').classList.remove('shake');},500);
    return;
  }

  // Fonction interne qui fait le login une fois les données prêtes
  function doLoginCheck(clientsData) {
    CLIENTS = clientsData || {};
    let user=null;
    if(ADMINS[id] && ADMINS[id].pin===String(pin)){user={...ADMINS[id],id};}
    else if(CLIENTS[id]&&CLIENTS[id].pin===String(pin)){user={...CLIENTS[id],id};}
    if(user){
      _loginAttempts = 0; // Reset on success
      for(let i=0;i<4;i++)document.getElementById('d'+i).className='dot ok';
      try{
        localStorage.setItem('acs_last_id', id);
        sessionStorage.setItem('acs_session', id);
      }catch(e){}
      setTimeout(()=>{
        CU=user;
        const _emailDone = localStorage.getItem('acs_email_done_'+id);
        const _emailVal  = localStorage.getItem('acs_email_'+id) || (CLIENTS[id]&&CLIENTS[id].email);
        if(!_emailDone && !_emailVal && user.role !== 'admin') {
          showEmailCapture(id, user);
        } else {
          if(_emailVal && !_emailDone) localStorage.setItem('acs_email_done_'+id,'1');
          initApp();
        }
      },380);
    }else{
      // Échec login
      _loginAttempts++;
      if (_loginAttempts >= 5) {
        _loginLockUntil = Date.now() + 300000; // Blocage 5 min
        _loginAttempts = 0;
        showToast('🔒 5 tentatives échouées — bloqué 5 minutes');
      }
      for(let i=0;i<4;i++)document.getElementById('d'+i).className='dot err';
      document.getElementById('pgrid').classList.add('shake');
      setTimeout(()=>{pin='';updDots();document.getElementById('pgrid').classList.remove('shake');},500);
    }
  }

  // Si Firebase est prêt, charger les données depuis Firebase (source de vérité)
  if (_fbdb) {
    fbLoad('clients').then(function(fbClients) {
      doLoginCheck(fbClients || load('clients', DEFAULT_CLIENTS));
    }).catch(function() {
      doLoginCheck(load('clients', DEFAULT_CLIENTS));
    });
  } else {
    // Mode offline — utiliser localStorage
    doLoginCheck(load('clients', DEFAULT_CLIENTS));
  }
}

    <div class="kc"><div class="kl">Bénéfice net</div><div class="kv">${fmt(totalNet)}</div><div class="kd ${totalNet>0?'up':''}">${u.villas.length} villa${u.villas.length>1?'s':''}</div></div>
  </div>
  <div class="kc" style="margin-bottom:1.2rem;background:linear-gradient(135deg,rgba(201,149,12,.12),rgba(201,149,12,.04));border-color:rgba(201,149,12,.35);cursor:pointer;" onclick="this.querySelector('.com-detail').style.display=this.querySelector('.com-detail').style.display==='none'?'block':'none'">

function viewClient(id){
  CLIENTS = load('clients', DEFAULT_CLIENTS);
  const c=CLIENTS[id]; if(!c)return;
  const villas = c.villas||[];
  const totalRev=villas.reduce((s,v)=>s+(v.rev||0),0);
  const totalNet=villas.reduce((s,v)=>s+(v.net||0),0);
  const totalCom=villas.reduce((s,v)=>s+(v.com||0),0);
  let h='<div class="mh"></div>';
  h+='<div style="display:flex;align-items:center;gap:.7rem;margin-bottom:.8rem;">';
  h+='<div class="av" style="width:42px;height:42px;font-size:.9rem;">'+c.initials+'</div>';
  h+='<div><div style="font-family:Cormorant Garamond,serif;font-size:1.3rem;color:var(--or3);font-weight:700;">'+c.name+'</div>';
  h+='<div style="font-size:.7rem;color:var(--gris);">'+villas.length+' villa'+(villas.length>1?'s':'')+' · ID: '+id+'</div></div></div>';
  h+='<div class="kr">';
  h+='<div class="kc"><div class="kl">Revenus</div><div class="kv">'+fmt(totalRev)+'</div></div>';
  h+='<div class="kc"><div class="kl">Bénéfice net</div><div class="kv" style="color:'+(totalNet>=0?'#4ade80':'#f87171')+'">'+fmt(totalNet)+'</div></div>';
  h+='</div>';
  if(villas.length>0){
    h+='<div class="sh">Villas</div>';
    villas.forEach(function(v){
      h+='<div class="vc '+(v.net>=0?'pos':'neg')+'" style="cursor:default;">';
      h+='<div class="vt"><div><div class="vn">'+v.name+'</div><div class="vp">'+(v.period||'Pas encore déclaré')+'</div></div>';
      h+='<div class="vnet '+(v.net>=0?'pos':'neg')+'">'+(v.net>=0?'+':'')+fmt(v.net)+'</div></div>';
      h+='<div class="chips"><div class="chip">Revenus <span>'+fmt(v.rev)+'</span></div><div class="chip">Charges <span>'+fmt((v.dep||0)+(v.chg||0))+'</span></div><div class="chip">Commission <span>'+fmt(v.com)+'</span></div></div>';
      h+='</div>';
    });
  }
  if(c.history && c.history.length>0){
    h+='<div class="sh" style="margin-top:.8rem;">Historique</div>';
    c.history.forEach(function(x){
      const rapport = buildRapportFromHistory(x);
      const rid = 'VC_'+(rapport.villa+'_'+rapport.mois).replace(/[^a-zA-Z0-9]/g,'_');
      window._rapports = window._rapports || {};
      window._rapports[rid] = rapport;
      const pos = rapport.net >= 0;
      h+='<div class="hi" onclick="genPDF(this,\''+rid+'\')" style="cursor:pointer;">';
      h+='<div class="hico">🏠</div><div style="flex:1;min-width:0;"><div class="hin">'+rapport.villa+'</div><div class="him">'+rapport.mois+'</div></div>';
      h+='<div class="hr2"><div class="ha" style="color:'+(pos?'#4ade80':'#f87171')+';">'+(pos?'+ ':'')+fmt(rapport.net)+'</div>';
      h+='<div style="font-size:.62rem;color:var(--or3);font-weight:600;">↓ PDF</div></div></div>';
    });
  }
  h+='<div style="display:flex;gap:.6rem;margin-top:1rem;">';
  h+='<button class="cb v" style="flex:1;" onclick="closeMov();generateSetupLink(\''+id+'\')">📲 Lien connexion</button>';
  h+='<button class="cancel-btn" style="flex:1;" onclick="closeMov()">Fermer</button>';
  h+='</div>';
  document.getElementById('modalbody').innerHTML=h;
  document.getElementById('modal').classList.add('open');
}

// Styles chips injectés via CSS

let avMode = 'client';
function togglePlat(el,k){el.classList.toggle('on');}
function selectNbr(el,n,id){document.querySelectorAll('.nbr-chip').forEach(x=>x.classList.remove('on'));el.classList.add('on');document.getElementById(id).value=n;}
function addExtraCharge(){
  const div=document.createElement('div');div.className='charge-row';
  div.innerHTML='<input class="form-input" placeholder="Nom charge" style="flex:1.5;"/><input class="form-input charge-input" type="number" placeholder="0 ฿" style="flex:1;"/><button onclick="this.parentNode.remove()" style="background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.3);color:#f87171;border-radius:6px;padding:.4rem .6rem;cursor:pointer;">✕</button>';
  document.getElementById('extra-charges').appendChild(div);
}
function avNext(step){
  if(step===1){
    const name=document.getElementById('av-name').value.trim();
    const com=document.getElementById('av-com').value;
    if(!name){showToast('⚠️ Donnez un nom à la villa');return;}
    if(!com||com<1||com>50){showToast('⚠️ Commission entre 1 et 50%');return;}
    document.getElementById('av-page-1').style.display='none';
    document.getElementById('av-page-2').style.display='block';
    document.getElementById('av-step-2-ind').style.background='var(--or3)';
  } else if(step===2){
    document.getElementById('av-page-2').style.display='none';
    document.getElementById('av-page-3').style.display='block';
    document.getElementById('av-step-3-ind').style.background='var(--or3)';
  }
}
function avBack(step){
  if(step===2){
    document.getElementById('av-page-2').style.display='none';
    document.getElementById('av-page-1').style.display='block';
    document.getElementById('av-step-2-ind').style.background='var(--gris2)';
  } else if(step===3){
    document.getElementById('av-page-3').style.display='none';
    document.getElementById('av-page-2').style.display='block';
    document.getElementById('av-step-3-ind').style.background='var(--gris2)';
  }
}
function avSave(mode){
  const name=document.getElementById('av-name').value.trim();
  const comPct=parseInt(document.getElementById('av-com').value)||0;
  const chambres=document.getElementById('av-chambres').value;
  const capa=document.getElementById('av-capa').value;
  const note=document.getElementById('av-note').value.trim();
  const owner=document.getElementById('av-owner').value.trim();

  // Plateformes
  const plats=[...document.querySelectorAll('.plat-chip.on')].map(x=>x.textContent);

  // Charges fixes
  const charges={};
  document.querySelectorAll('#charges-list .charge-row').forEach(row=>{
    const key=row.dataset.key;
    const val=parseInt(row.querySelector('.charge-input').value)||0;
    if(val>0) charges[key]=val;
  });
  // Charges extra
  document.querySelectorAll('#extra-charges .charge-row').forEach(row=>{
    const inputs=row.querySelectorAll('input');
    const key=inputs[0].value.trim();
    const val=parseInt(inputs[1].value)||0;
    if(key&&val>0) charges[key]=val;
  });
  const totalCharges=Object.values(charges).reduce((s,v)=>s+v,0);

  // Construire la villa
  const vid=(name.toLowerCase().replace(/\s+/g,'-')+'-'+Date.now());
  const sections=[
    {t:'Revenus',items:[['En attente de données','0 ฿']],total:'0 ฿'},
  ];
  if(totalCharges>0){
    sections.push({t:'Charges fixes mensuelles',items:Object.entries(charges).map(([k,v])=>[k.charAt(0).toUpperCase()+k.slice(1),fmt(v)]),total:fmt(totalCharges)});
  }
  sections.push({t:'Commission',items:[['Taux : '+comPct+'%','Calculé sur revenus bruts']],total:comPct+'%'});

  const villa={
    id:vid, name, period:'', pos:true, net:0, rev:0,
    dep:0, chg:totalCharges, com:0, comPct,
    charges, plats, chambres, capa, note, owner,
    sections
  };

  // Déterminer le client cible
  let targetId;
  if(mode==='admin'){
    targetId=document.getElementById('av-client').value;
  } else {
    targetId=CU.id;
  }

  if(!CLIENTS[targetId]){showToast('⚠️ Client introuvable');return;}
  if(!CLIENTS[targetId].villas) CLIENTS[targetId].villas=[];
  CLIENTS[targetId].villas.push(villa);
  save('clients',CLIENTS);

  // Recharger l'interface
  if(CU.role==='admin'){
    if(targetId===CU.id) CU=CLIENTS[targetId];
    buildAdmin();
  } else {
    CU={...CLIENTS[targetId],id:targetId};
    buildClient();
  }
  closeMov();
  showToast('✅ Villa "'+name+'" ajoutée avec succès !');
}

function saveNewClient(){

  let id=document.getElementById('fc-id').value.trim().toLowerCase().replace(/[^a-z0-9._-]/g,'').replace(/\s+/g,'.');

  var rawPin = fcpin.length===4 ? fcpin : (document.getElementById('fc-pin')?document.getElementById('fc-pin').value:'');

function doDelete(id){
  const name=CLIENTS[id]?CLIENTS[id].name:'';
  delete CLIENTS[id];
  save('clients',CLIENTS);
  // Nettoyer les données associées (amis, messages)
  var friends = load('friends', {});
  if (friends[id]) {
    // Retirer cet utilisateur des listes d'amis de ses contacts
    (friends[id] || []).forEach(function(fid) {

function aboQuick(months){
  var d = new Date();
  var cur = document.getElementById('abo-date').value;
  if(cur && new Date(cur) > d) d = new Date(cur);
  d.setMonth(d.getMonth() + months);
  document.getElementById('abo-date').value = d.toISOString().split('T')[0];
}
function saveAbo(cid){
  CLIENTS = load('clients', DEFAULT_CLIENTS);
  var date = document.getElementById('abo-date').value;

  showToast('✅ Abonnement mis à jour pour '+CLIENTS[cid].name);
}

function saveLocation(villaId){
  var from = document.getElementById('loc-from').value;
  var to = document.getElementById('loc-to').value;
  if(!from || !to){showToast('⚠️ Renseignez les dates de début et fin');return;}
  var plats = [];
  document.querySelectorAll('#loc-plats .plat-chip.on').forEach(function(el){ plats.push(el.textContent); });
  var amount = parseFloat(document.getElementById('loc-amount').value) || 0;
  var note = (document.getElementById('loc-note').value||'').trim();

  var cid = CU.id || localStorage.getItem('acs_last_id');
  if(!cid || !CLIENTS[cid]) return;
  var v = CLIENTS[cid].villas ? CLIENTS[cid].villas.find(function(x){ return x.id===villaId; }) : null;
  if(!v){showToast('❌ Villa introuvable');return;}
  if(!v.locations) v.locations = [];
  v.locations.push({ from:from, to:to, platform:plats.join(', '), amount:amount, note:note, ts:Date.now() });
  // Trier par date
  v.locations.sort(function(a,b){ return new Date(a.from) - new Date(b.from); });
  save('clients', CLIENTS);
  // Mettre à jour CU
  CU = {...CLIENTS[cid], id:cid};
  openVilla(villaId);
  showToast('✅ Location enregistrée');
}

function deleteLocation(villaId, idx){
  var cid = CU.id || localStorage.getItem('acs_last_id');
  if(!cid || !CLIENTS[cid]) return;
  var v = CLIENTS[cid].villas ? CLIENTS[cid].villas.find(function(x){ return x.id===villaId; }) : null;
  if(!v || !v.locations) return;
  v.locations.splice(idx, 1);
  save('clients', CLIENTS);
  CU = {...CLIENTS[cid], id:cid};
  openVilla(villaId);
  showToast('✅ Location supprimée');
}

function connectAirbnb(villaId){
  var url = (document.getElementById('airbnb-url').value||'').trim();
  if(!url){showToast('⚠️ Entrez l\'URL ou l\'ID Airbnb');return;}
  // Extraire l'ID
  var id = url.replace(/.*rooms\//,'').replace(/\?.*/,'').replace(/[^0-9a-zA-Z_-]/g,'');
  if(!id) id = url;
  var airbnbName = (document.getElementById('airbnb-name').value||'').trim();
  var icalUrl = (document.getElementById('airbnb-ical')||{}).value;
  icalUrl = icalUrl ? icalUrl.trim() : '';

  var cid = CU.id || localStorage.getItem('acs_last_id');
  CLIENTS = load('clients', DEFAULT_CLIENTS);
  var v = CLIENTS[cid] && CLIENTS[cid].villas ? CLIENTS[cid].villas.find(function(x){ return x.id===villaId; }) : null;
  if(!v) return;
  v.airbnbId = id;
  v.airbnbName = airbnbName || v.name;
  if(icalUrl) v.icalUrl = icalUrl;
  if(!v.reservations) v.reservations = [];
  save('clients', CLIENTS);
  CU = {...CLIENTS[cid], id:cid};
  showToast('✅ Airbnb connecté !');
  // Si iCal fourni, lancer la sync
  if(icalUrl) syncIcal(villaId);
  else openAirbnbConnect(villaId);
}

function syncIcal(villaId){
  var cid = CU.id || localStorage.getItem('acs_last_id');
  CLIENTS = load('clients', DEFAULT_CLIENTS);
  var v = CLIENTS[cid] && CLIENTS[cid].villas ? CLIENTS[cid].villas.find(function(x){ return x.id===villaId; }) : null;
  if(!v || !v.icalUrl){showToast('⚠️ Aucun lien iCal configuré');return;}
  showToast('🔄 Synchronisation du calendrier...');

  // Utiliser un proxy CORS pour récupérer le fichier iCal
  var proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(v.icalUrl);
  fetch(proxyUrl)
    .then(function(res){
      if(!res.ok) throw new Error('HTTP '+res.status);
      return res.text();
    })
    .then(function(icalData){
      var events = parseIcal(icalData);
      if(events.length===0){
        showToast('📅 Calendrier synchronisé — aucune réservation trouvée');
      } else {
        // Fusionner avec les réservations existantes (sans doublons)
        if(!v.reservations) v.reservations = [];
        var added = 0;
        events.forEach(function(evt){
          var exists = v.reservations.find(function(r){
            return r.checkin===evt.checkin && r.checkout===evt.checkout;
          });
          if(!exists){
            v.reservations.push(evt);
            added++;
          }
        });
        // Trier par date de check-in
        v.reservations.sort(function(a,b){ return new Date(a.checkin)-new Date(b.checkin); });
        v.lastSync = new Date().toLocaleDateString('fr-FR')+' '+new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
        save('clients', CLIENTS);
        CU = {...CLIENTS[cid], id:cid};
        showToast('✅ '+added+' nouvelle'+(added>1?'s':'')+' réservation'+(added>1?'s':'')+' importée'+(added>1?'s':'')+'  ('+events.length+' total)');
      }
      openAirbnbConnect(villaId);
    })
    .catch(function(err){
      console.error('iCal sync error:', err);
      showToast('❌ Impossible de synchroniser — vérifiez le lien iCal');
      openAirbnbConnect(villaId);
    });
}

function parseIcal(icalData){
  var events = [];
  var blocks = icalData.split('BEGIN:VEVENT');
  for(var i=1; i<blocks.length; i++){
    var block = blocks[i].split('END:VEVENT')[0];
    var evt = {};
    // Extraire DTSTART
    var dtstart = block.match(/DTSTART[^:]*:(\d{8})/);
    if(dtstart) evt.checkin = dtstart[1].substring(0,4)+'-'+dtstart[1].substring(4,6)+'-'+dtstart[1].substring(6,8);
    // Extraire DTEND
    var dtend = block.match(/DTEND[^:]*:(\d{8})/);
    if(dtend) evt.checkout = dtend[1].substring(0,4)+'-'+dtend[1].substring(4,6)+'-'+dtend[1].substring(6,8);
    // Extraire SUMMARY (nom du voyageur)
    var summary = block.match(/SUMMARY[^:]*:([^\r\n]+)/);
    if(summary) evt.guest = summary[1].trim();
    // Extraire DESCRIPTION
    var desc = block.match(/DESCRIPTION[^:]*:([^\r\n]+)/);
    if(desc) evt.description = desc[1].trim();

    if(evt.checkin && evt.checkout){
      var nights = Math.max(1, Math.ceil((new Date(evt.checkout)-new Date(evt.checkin))/86400000));
      evt.nights = nights;
      evt.source = 'Airbnb (iCal)';
      evt.amount = 0; // Montant inconnu depuis iCal — l'utilisateur devra le renseigner
      // Essayer d'extraire un montant depuis la description si disponible
      if(evt.description){
        var amtMatch = evt.description.match(/(\d[\d\s,.]*)\s*(?:THB|฿|baht)/i);
        if(amtMatch) evt.amount = parseFloat(amtMatch[1].replace(/[\s,]/g,''))||0;
      }
      // Ignorer les événements "blocked" ou "Not available"
      var guestLower = (evt.guest||'').toLowerCase();
      if(guestLower.indexOf('not available')<0 && guestLower.indexOf('blocked')<0 && guestLower.indexOf('airbnb (not available)')<0){
        events.push(evt);
      }
    }
  }
  return events;
}

}

// Calculer les revenus Airbnb d'une villa pour un mois donné
function getAirbnbRevenue(villa, mois, annee){
  var MOIS_NOMS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  var moisIdx = MOIS_NOMS.indexOf(mois);
  if(moisIdx < 0) return {total:0, count:0, details:[]};
  var resa = villa.reservations || [];
  var matched = [];
  resa.forEach(function(r){
    var d = new Date(r.checkin);
    if(d.getMonth()===moisIdx && d.getFullYear()===parseInt(annee)){
      matched.push(r);
    }
  });
  var total = matched.reduce(function(s,r){return s+(r.amount||0);},0);
  return {total:total, count:matched.length, details:matched};
}

function getLocationRevenue(villa, mois, annee){
  var MOIS_NOMS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  var moisIdx = MOIS_NOMS.indexOf(mois);
  if(moisIdx < 0) return {total:0, count:0, airbnb:0, booking:0};
  var locs = villa.locations || [];
  var matched = [];
  locs.forEach(function(loc){
    var d = new Date(loc.from);
    if(d.getMonth()===moisIdx && d.getFullYear()===parseInt(annee)){
      matched.push(loc);
    }
  });
  var total = matched.reduce(function(s,l){return s+(l.amount||0);},0);
  var airbnb = matched.filter(function(l){ return (l.platform||'').toLowerCase().indexOf('airbnb')>=0; }).reduce(function(s,l){return s+(l.amount||0);},0);
  var booking = matched.filter(function(l){ return (l.platform||'').toLowerCase().indexOf('booking')>=0; }).reduce(function(s,l){return s+(l.amount||0);},0);
  return {total:total, count:matched.length, airbnb:airbnb, booking:booking};
}

function getAboLabel(){
  if(!CU || CU.role==='admin') return 'Gérer les clients';
  var cid = CU.id;
  CLIENTS = load('clients', DEFAULT_CLIENTS);
  var c = CLIENTS[cid];
  if(!c || !c.aboEnd) return 'Formule ACS';
  var diff = Math.ceil((new Date(c.aboEnd) - new Date()) / 86400000);
  if(diff > 30) return 'Actif — expire le '+new Date(c.aboEnd).toLocaleDateString('fr-FR');
  if(diff > 0) return '⚠️ '+diff+' jours restants';
  return '❌ Expiré';
}

// ══ BUILD CARD (utilisée dans modales résultats) ══
function buildCard(r){
  if(!r) return '';
  if(!r.deps) r.deps=[];
  if(!r.net) r.net = (r.rev||0)-(r.totalDep||0)-(r.com||0);
  var nc=r.net>=0?'#4ade80':'#f87171';
  var ns=(r.net>=0?'+':'')+fmt(r.net);
  var rows='';
  if(r.rev>0) rows+='<div class="rr"><span>Revenus totaux</span><span>'+fmt(r.rev)+'</span></div>';
  r.deps.forEach(function(d){rows+='<div class="rr"><span>'+d.n.charAt(0).toUpperCase()+d.n.slice(1)+'</span><span class="rn">−'+fmt(d.v)+'</span></div>';});
  if(r.com>0) rows+='<div class="rr"><span>Commission '+r.cp+'%</span><span class="rn">−'+fmt(r.com)+'</span></div>';
  rows+='<div class="rr"><span>'+(r.net>=0?'BÉNÉFICE NET':'DÉFICIT NET')+'</span><span style="color:'+nc+'">'+ns+'</span></div>';
  var rid='rpt_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
  window._rapports = window._rapports||{};
  window._rapports[rid] = r;
  return '<div class="rc"><div class="rct">📊 '+r.villa+' · '+r.mois+'</div>'+rows+'<div class="rb"><button class="rbtn g" id="'+rid+'_btn" onclick="genPDF(this,\''+rid+'\')" style="width:100%;border-radius:6px;">📄 Télécharger PDF</button></div></div>';
}

function submitDeclaration(){
  const mois = document.getElementById('decl-mois').value;
  const annee = document.getElementById('decl-annee').value;
  const periode = mois+' '+annee;

  // Read all values BEFORE closing the modal (elements get destroyed on close)
  const villaData = [];
  CU.villas.forEach(function(v, vi){
    villaData.push({
      v: v,
      air: parseFloat((document.getElementById('d'+vi+'_air')||{}).value)||0,
      bk:  parseFloat((document.getElementById('d'+vi+'_bk') ||{}).value)||0,
      el:  parseFloat((document.getElementById('d'+vi+'_el') ||{}).value)||0,
      eau: parseFloat((document.getElementById('d'+vi+'_eau')||{}).value)||0,
      men: parseFloat((document.getElementById('d'+vi+'_men')||{}).value)||0,
      div: parseFloat((document.getElementById('d'+vi+'_div')||{}).value)||0,
      extra: parseFloat((document.getElementById('d'+vi+'_extra')||{}).value)||0,
      cp:  parseFloat((document.getElementById('d'+vi+'_com')||{}).value)||(v.comPct||20)
    });
  });

  closeMov();

  const allReports = [];

  villaData.forEach(function(d){
    const v=d.v;
    const air=d.air, bk=d.bk, el=d.el, eau=d.eau, men=d.men;
    const div=d.div, extra=d.extra||0, cp=d.cp;
    const rev = air + bk + extra;
    if(rev===0) return;

    // Charges fixes de la villa — seulement pisciniste, jardinier, internet
    const FIXED_KEYS = ['pisciniste','jardinier','internet'];
    const fixedDeps = v.charges
      ? Object.entries(v.charges)
          .filter(function(e){ return FIXED_KEYS.includes(e[0].toLowerCase()); })
          .map(function(e){ return {n:e[0].charAt(0).toUpperCase()+e[0].slice(1),v:e[1]}; })
      : [];
    // Charges variables
    const varDeps = [];
    if(el>0)  varDeps.push({n:'Électricité',v:el});
    if(eau>0) varDeps.push({n:'Eau',v:eau});
    if(men>0) varDeps.push({n:'Ménage',v:men});
    if(div>0) varDeps.push({n:'Divers',v:div});

    const allDeps = fixedDeps.concat(varDeps);
    const totalDep = allDeps.reduce(function(s,d){return s+d.v;},0);
    const com = Math.round(rev * cp / 100);
    const net = rev - totalDep - com;

    // ── Mettre à jour les propriétés de la villa pour le dashboard ──
    v.rev = rev;
    v.dep = varDeps.reduce(function(s,d){return s+d.v;},0);
    v.chg = fixedDeps.reduce(function(s,d){return s+d.v;},0);
    v.net = net;
    v.com = com;
    v.comPct = cp;
    v.period = periode;
    v.pos = net >= 0;

    const r = {villa:v.name, mois:periode, rev:rev, deps:allDeps, totalDep:totalDep, cp:cp, com:com, net:net, client:CU?CU.name:''};
    allReports.push(r);
    addToHistory(r);
  });

  // ── Sauvegarder les villas mises à jour dans CLIENTS ──
  var cid = CU.id || localStorage.getItem('acs_last_id');
  if(cid && CLIENTS[cid]){
    CLIENTS[cid].villas = CU.villas;
    save('clients', CLIENTS);
  }

  if(allReports.length===0){
    showToast('⚠️ Aucun revenu déclaré — remplissez au moins Airbnb ou Booking');
    return;
  }

  // Afficher les résultats dans une modale
  var cards = allReports.map(function(r){ return buildCard(r); }).join('');
  document.getElementById('modalbody').innerHTML =
    '<div class="mh"></div>'
    +'<div style="text-align:center;margin-bottom:1rem;">'
      +'<div style="font-size:2rem;margin-bottom:.4rem;">🎉</div>'
      +'<div style="font-family:Cormorant Garamond,serif;font-size:1.3rem;color:var(--or3);">Déclaration traitée !</div>'
      +'<div style="font-size:.72rem;color:var(--gris);margin-top:.25rem;">'+periode+' · '+allReports.length+' villa'+(allReports.length>1?'s':'')+' · Téléchargez vos PDF ci-dessous</div>'
    +'</div>'
    + cards
    +'<button class="cancel-btn" style="margin-top:.8rem;" onclick="closeMov();goPage(\'hist\')">📂 Voir l\'historique</button>'
    +'<button class="cancel-btn" onclick="closeMov()">Fermer</button>';
  document.getElementById('modal').classList.add('open');
  buildClient(); // Rafraîchir dashboard
}


// ══ AJOUTER RAPPORT À L'HISTORIQUE ══
function addToHistory(r){
  if(!CU) return;
  // Trouver l'ID client même si CU.id pas défini
  var cid = CU.id || localStorage.getItem('acs_last_id');
  if(!cid || !CLIENTS[cid]) return;
  const entry={
    id: 'h_'+Date.now(),
    name: r.villa,
    period: r.mois,
    net: r.net,
    pos: r.net>=0,
    rev: r.rev,
    dep: r.totalDep||0,
    com: r.com||0,
    details: r,
    client: CU ? CU.name : '',
    date: new Date().toLocaleDateString('fr-FR')
  };
  if(!CLIENTS[cid].history) CLIENTS[cid].history=[];
  // Éviter doublons (même villa + même mois)
  const exists = CLIENTS[cid].history.find(function(h){ return h.name===r.villa && h.period===r.mois; });
  if(!exists){
    CLIENTS[cid].history.unshift(entry);
    save('clients', CLIENTS);
    // Recharger CU avec les nouvelles données
    CU = {...CLIENTS[cid], id:cid};
    // Reconstruire l'interface
    buildClient();
    showToast('📋 Rapport ajouté à l\'historique !');
  }
}

// ══ GÉNÉRATION PDF RÉELLE ══
function genPDF(btn, rid){
  var r = (typeof rid==='string') ? (window._rapports && window._rapports[rid]) : rid;
  if(!r){ showToast('❌ Rapport introuvable'); return; }
  if(!window.jspdf){
    showToast('⏳ Chargement PDF...');
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s.onload=function(){ genPDF(btn,rid); };
    document.head.appendChild(s); return;
  }
  try {
    if(!r.deps) r.deps=[];
    var jsPDF=window.jspdf.jsPDF;
    var doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    var W=210, mg=16, y=0;

    // ── PALETTE ──
    var NOIR   = [8,8,8];
    var NOIR2  = [18,18,18];
    var NOIR3  = [26,26,26];
    var OR     = [201,149,12];
    var OR3    = [245,208,107];
    var BLANC  = [242,242,242];
    var GRIS   = [120,120,120];
    var ROUGE  = [220,60,60];
    var VERT   = [74,222,128];

    // ── FOND PAGE ──
    doc.setFillColor.apply(doc, NOIR2);
    doc.rect(0,0,W,297,'F');

    // ── HEADER BAND ──
    doc.setFillColor.apply(doc, NOIR);
    doc.rect(0,0,W,52,'F');

    // Ligne déco or gauche
    doc.setFillColor.apply(doc, OR);
    doc.rect(0,0,3,52,'F');

    // Logo ACS
    doc.setFont('helvetica','bold');
    doc.setFontSize(32);
    doc.setTextColor.apply(doc, OR3);
    doc.text('ACS',mg+4,22);

    // Tagline
    doc.setFont('helvetica','normal');
    doc.setFontSize(7);
    doc.setTextColor.apply(doc, GRIS);
    doc.text('ACCOUNTING CONCIERGE SERVICES',mg+4,30);

    // Ligne séparatrice verticale
    doc.setDrawColor.apply(doc, OR);
    doc.setLineWidth(0.3);
    doc.line(75,8,75,44);

    // Infos rapport à droite du séparateur
    doc.setFont('helvetica','bold');
    doc.setFontSize(14);
    doc.setTextColor.apply(doc, BLANC);
    doc.text(String(r.villa||'Villa'), 82, 20);
    doc.setFont('helvetica','normal');
    doc.setFontSize(9);
    doc.setTextColor.apply(doc, OR3);
    doc.text(String(r.mois||''), 82, 28);
    doc.setFontSize(7);
    doc.setTextColor.apply(doc, GRIS);
    doc.text('Rapport généré le '+new Date().toLocaleDateString('fr-FR'), 82, 36);

    // Badge statut net
    var netPos = (r.net||0)>=0;
    var badgeW = 42;
    var badgeX = W-mg-badgeW-2;
    var badgeCX = badgeX + badgeW/2;
    doc.setFillColor.apply(doc, netPos ? [20,60,30] : [60,15,15]);
    doc.roundedRect(badgeX,8,badgeW,18,2,2,'F');
    doc.setDrawColor.apply(doc, netPos ? VERT : ROUGE);
    doc.setLineWidth(0.4);
    doc.roundedRect(badgeX,8,badgeW,18,2,2,'S');
    doc.setFont('helvetica','bold');
    doc.setFontSize(7);
    doc.setTextColor.apply(doc, netPos ? VERT : ROUGE);
    doc.text(netPos ? 'BENEFICE' : 'DEFICIT', badgeCX,16,{align:'center'});
    var badgeStr = (netPos?'+ ':'')+fmtPDFb(r.net||0);
    var bFs = 8;
    doc.setFontSize(bFs);
    while(bFs > 5.5 && doc.getTextWidth(badgeStr) > badgeW - 6){ bFs -= 0.4; doc.setFontSize(bFs); }
    doc.text(badgeStr, badgeCX, 23, {align:'center'});

    // Ligne or bas header
    doc.setDrawColor.apply(doc, OR);
    doc.setLineWidth(0.6);
    doc.line(0,52,W,52);

    y = 58;

    // ── SECTION REVENUS ──
    function sectionTitle(title, yy){
      yy += 4; // espace avant chaque section
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(7);
      doc.setTextColor.apply(doc, OR);
      doc.text(title.toUpperCase(), mg, yy);
      doc.setDrawColor.apply(doc, OR);
      doc.setLineWidth(0.3);
      var tw = doc.getTextWidth(title.toUpperCase());
      doc.line(mg + tw + 3, yy - 1, W - mg, yy - 1);
      return yy + 5;
    }

    // Layout colonnes : label [mg+3 .. W/2+20] | valeur [W/2+22 .. W-mg-3]
    var COL_LABEL_X  = mg + 3;
    var COL_LABEL_MAX = W * 0.62;          // label occupe 62% de la largeur
    var COL_VAL_X    = W - mg - 3;        // valeur alignée à droite fixe
    var ROW_H        = 10;                // hauteur ligne standard

    function tableRow(label, valeur, bold, colorLeft, colorRight, bg){
      var fs = bold ? 10 : 9;
      var lineH = ROW_H + (bold ? 2 : 0);
      // Fond de ligne
      if(bg){
        doc.setFillColor.apply(doc, bg);
        doc.rect(mg, y, W-2*mg, lineH, 'F');
      }
      var textY = y + lineH*0.65; // baseline verticalement centrée

      // ── Label (zone gauche : mg+3 jusqu'à 65% de la largeur)
      doc.setFont('helvetica', bold ? 'bold' : 'normal');
      doc.setFontSize(fs);
      doc.setTextColor.apply(doc, colorLeft || BLANC);
      var maxLW = (W - 2*mg) * 0.62; // 62% pour le label
      var labelStr = String(label);
      while(labelStr.length > 4 && doc.getTextWidth(labelStr) > maxLW - 4){
        labelStr = labelStr.slice(0, -1);
      }
      if(labelStr !== String(label)) labelStr += '..';
      doc.text(labelStr, mg + 3, textY);

      // ── Valeur (zone droite : alignée sur W-mg-3)
      doc.setFont('helvetica', bold ? 'bold' : 'normal');
      doc.setFontSize(fs);
      doc.setTextColor.apply(doc, colorRight || BLANC);
      var valStr = String(valeur);
      var maxVW = (W - 2*mg) * 0.36; // 36% pour la valeur
      var fsTmp = fs;
      doc.setFontSize(fsTmp);
      while(fsTmp > 6.5 && doc.getTextWidth(valStr) > maxVW - 4){
        fsTmp -= 0.4;
        doc.setFontSize(fsTmp);
      }
      doc.text(valStr, W - mg - 3, textY, { align: 'right' });
      doc.setFontSize(fs);

      // ── Ligne séparatrice
      if(!bold){
        doc.setDrawColor(50, 50, 50);
        doc.setLineWidth(0.1);
        doc.line(mg, y + lineH, W - mg, y + lineH);
      }
      y += lineH;
    }

    // Revenus
    y = sectionTitle('Revenus', y);
    tableRow('Airbnb, Booking, Location', fmtPDFb(r.rev||0), false, BLANC, OR3);

    // Séparation charges fixes / variables
    var PDF_FIXES = ['pisciniste','jardinier','internet'];
    var varDeps = r.deps ? r.deps.filter(function(d){ return !PDF_FIXES.includes(d.n.toLowerCase()); }) : [];
    var fixDeps = r.deps ? r.deps.filter(function(d){ return PDF_FIXES.includes(d.n.toLowerCase()); }) : [];

    if(varDeps.length>0){
      y = sectionTitle('Charges variables', y);
      varDeps.forEach(function(d){
        tableRow(d.n.charAt(0).toUpperCase()+d.n.slice(1), '- '+fmtPDFb(d.v||0), false, BLANC, ROUGE);
      });
    }

    // Charges fixes
    if(fixDeps.length>0){
      y = sectionTitle('Charges fixes', y);
      fixDeps.forEach(function(d){
        tableRow(d.n.charAt(0).toUpperCase()+d.n.slice(1), '- '+fmtPDFb(d.v||0), false, BLANC, ROUGE);
      });
    }

    // Commission
    if((r.com||0)>0){
      var clientLabel = r.client || (CU ? CU.name : '') || 'ACS';
      y = sectionTitle('Commission ' + clientLabel, y);
      tableRow('Commission ' + r.cp + '% des revenus bruts', '- ' + fmtPDFb(r.com||0), false, BLANC, ROUGE);
    }

    // ── TOTAL NET ──
    y += 6;
    var netBoxH = 16;
    doc.setFillColor.apply(doc, netPos ? [10,32,16] : [40,10,10]);
    doc.roundedRect(mg, y, W-2*mg, netBoxH, 2, 2, 'F');
    doc.setDrawColor.apply(doc, netPos ? VERT : ROUGE);
    doc.setLineWidth(0.6);
    doc.roundedRect(mg, y, W-2*mg, netBoxH, 2, 2, 'S');
    var netMid = y + netBoxH*0.65;
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(10);
    doc.setTextColor.apply(doc, netPos ? VERT : ROUGE);
    doc.text(netPos ? 'BENEFICE NET' : 'DEFICIT NET', mg+5, netMid);
    var netStr = (netPos ? '+ ' : '- ') + fmtPDFb(Math.abs(r.net||0));
    var netFs = 11;
    doc.setFontSize(netFs);
    while(netFs > 7 && doc.getTextWidth(netStr) > (W-2*mg)*0.4){ netFs -= 0.5; doc.setFontSize(netFs); }
    doc.text(netStr, W-mg-5, netMid, { align:'right' });
    y += netBoxH + 8;

    // ── RÉCAP RAPIDE ──
    var boxW = (W - 2*mg - 6) / 3;
    function miniBox(label, val, col, bx){
      var bh = 18;
      doc.setFillColor.apply(doc, [22,22,22]);
      doc.roundedRect(bx, y, boxW, bh, 2, 2, 'F');
      doc.setDrawColor(45,45,45);
      doc.setLineWidth(0.2);
      doc.roundedRect(bx, y, boxW, bh, 2, 2, 'S');
      // Valeur
      var mFs = 8.5;
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(mFs);
      doc.setTextColor.apply(doc, col || OR3);
      var valS = String(val);
      while(mFs > 5.5 && doc.getTextWidth(valS) > boxW - 6){ mFs -= 0.3; doc.setFontSize(mFs); }
      doc.text(valS, bx + boxW/2, y + bh*0.48, { align:'center' });
      // Label
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(6.5);
      doc.setTextColor.apply(doc, GRIS);
      doc.text(label, bx + boxW/2, y + bh*0.82, { align:'center' });
    }
    miniBox('Revenus bruts',  fmtPDFb(r.rev||0), OR3, mg);
    miniBox('Total charges',  fmtPDFb((r.totalDep||0)+(r.com||0)), ROUGE, mg+boxW+3);
    miniBox('Resultat net',   (netPos?'+ ':'')+fmtPDFb(r.net||0), netPos?VERT:ROUGE, mg+(boxW+3)*2);
    y += 26;

    // ── FOOTER ──
    doc.setFillColor.apply(doc, NOIR);
    doc.rect(0,272,W,25,'F');
    doc.setDrawColor.apply(doc, OR);
    doc.setLineWidth(0.3);
    doc.line(0,272,W,272);
    // Ligne or déco gauche
    doc.setFillColor.apply(doc, OR);
    doc.rect(0,272,3,25,'F');
    doc.setFont('helvetica','bold');
    doc.setFontSize(8);
    doc.setTextColor.apply(doc, OR3);
    doc.text('ACS — Accounting Concierge Services', mg+4, 281);
    doc.setFont('helvetica','normal');
    doc.setFontSize(7);
    doc.setTextColor.apply(doc, GRIS);
    doc.text('acsconcierge.pro@gmail.com  |  +66 91 333 9323  |  Koh Samui, Thaïlande', mg+4, 288);
    doc.setTextColor.apply(doc, [60,60,60]);
    doc.text('Document confidentiel — généré automatiquement', W-mg, 288, {align:'right'});

    // Sauvegarder
    var fname='ACS_'+(r.villa||'Rapport').replace(/\s+/g,'_')+'_'+(r.mois||'').replace(/\s+/g,'_')+'.pdf';
    doc.save(fname);
    showToast('✅ PDF téléchargé !');
    if(btn){ btn.textContent='✅ Téléchargé'; btn.style.opacity='0.7'; setTimeout(function(){ btn.textContent='📄 Télécharger PDF'; btn.style.opacity='1'; },3000); }
  } catch(e){
    console.error('PDF error',e);
    showToast('❌ Erreur PDF : '+e.message);
  }
}


// ══ RAPPORT ANNUEL GLOBAL ══
function openRapportAnnuel(){
  CLIENTS = load('clients', DEFAULT_CLIENTS);
  const curYear = new Date().getFullYear();
  const years = {};
  // Collecter toutes les années disponibles
  Object.values(CLIENTS).forEach(function(c){
    if(!c.history) return;
    c.history.forEach(function(h){
      const m = (h.period||'').match(/(\d{4})/);
      if(m) years[m[1]] = true;
    });
  });
  if(!years[curYear]) years[curYear] = true;
  const yearList = Object.keys(years).sort().reverse();

  let h='<div class="mh"></div>';
  h+='<div style="text-align:center;margin-bottom:1rem;">';
  h+='<div style="font-size:2rem;margin-bottom:.4rem;">📊</div>';
  h+='<div style="font-family:Cormorant Garamond,serif;font-size:1.3rem;color:var(--or3);">Rapport annuel global</div>';
  h+='<div style="font-size:.72rem;color:var(--gris);margin-top:.2rem;">Sélectionnez l\'année</div>';
  h+='</div>';
  h+='<div class="form-group"><select class="form-select" id="ra-year">';
  yearList.forEach(function(y){ h+='<option value="'+y+'"'+(y==curYear?' selected':'')+'>'+y+'</option>'; });
  h+='</select></div>';
  h+='<button class="save-btn" onclick="genRapportAnnuel()">📄 Générer le rapport annuel</button>';
  h+='<button class="cancel-btn" onclick="closeMov()">Annuler</button>';
  document.getElementById('modalbody').innerHTML=h;
  document.getElementById('modal').classList.add('open');
}

function genRapportAnnuel(){
  CLIENTS = load('clients', DEFAULT_CLIENTS);
  const year = document.getElementById('ra-year').value;
  const MOIS_NOMS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

  // Collecter données par client et par mois
  const clientData = {};
  let grandTotalRev=0, grandTotalDep=0, grandTotalCom=0, grandTotalNet=0;

  Object.entries(CLIENTS).forEach(function(entry){
    const cid=entry[0], c=entry[1];
    if(!c.history) return;
    const cInfo = {name:c.name, months:{}, totalRev:0, totalDep:0, totalCom:0, totalNet:0};
    c.history.forEach(function(h){
      if(!(h.period||'').includes(year)) return;
      const rev=h.rev||0, dep=h.dep||0, com=h.com||0, net=h.net||0;
      const moisName = (h.period||'').replace(' '+year,'').trim();
      if(!cInfo.months[moisName]) cInfo.months[moisName]={rev:0,dep:0,com:0,net:0,villas:[]};
      cInfo.months[moisName].rev+=rev;
      cInfo.months[moisName].dep+=dep;
      cInfo.months[moisName].com+=com;
      cInfo.months[moisName].net+=net;
      cInfo.months[moisName].villas.push(h.name||'Villa');
      cInfo.totalRev+=rev; cInfo.totalDep+=dep; cInfo.totalCom+=com; cInfo.totalNet+=net;
    });
    if(cInfo.totalRev>0 || Object.keys(cInfo.months).length>0){
      clientData[cid]=cInfo;
      grandTotalRev+=cInfo.totalRev; grandTotalDep+=cInfo.totalDep;
      grandTotalCom+=cInfo.totalCom; grandTotalNet+=cInfo.totalNet;
    }
  });

  // Afficher résumé dans la modale
  let h='<div class="mh"></div>';
  h+='<div style="text-align:center;margin-bottom:1rem;">';
  h+='<div style="font-size:2rem;margin-bottom:.4rem;">📊</div>';
  h+='<div style="font-family:Cormorant Garamond,serif;font-size:1.3rem;color:var(--or3);">Bilan annuel '+year+'</div>';
  h+='<div style="font-size:.72rem;color:var(--gris);margin-top:.2rem;">'+Object.keys(clientData).length+' client'+(Object.keys(clientData).length>1?'s':'')+' actif'+(Object.keys(clientData).length>1?'s':'')+'</div>';
  h+='</div>';

  // KPIs
  h+='<div class="kr">';
  h+='<div class="kc"><div class="kl">Revenus totaux</div><div class="kv">'+fmt(grandTotalRev)+'</div></div>';
  h+='<div class="kc"><div class="kl">Bénéfice net</div><div class="kv" style="color:'+(grandTotalNet>=0?'#4ade80':'#f87171')+'">'+fmt(grandTotalNet)+'</div></div>';
  h+='</div>';
  h+='<div class="kr">';
  h+='<div class="kc"><div class="kl">Charges totales</div><div class="kv" style="font-size:1.2rem;color:#f87171;">'+fmt(grandTotalDep)+'</div></div>';
  h+='<div class="kc"><div class="kl">Commissions</div><div class="kv" style="font-size:1.2rem;">'+fmt(grandTotalCom)+'</div></div>';
  h+='</div>';

  // Par client
  Object.entries(clientData).forEach(function(entry){
    var cid=entry[0], d=entry[1];
    h+='<div class="cc" style="margin-bottom:.5rem;">';
    h+='<div class="cct"><div class="ccn">'+d.name+'</div><span class="ccp b">'+fmt(d.totalNet)+'</span></div>';
    h+='<div class="ccs"><div class="cst">Revenus <span>'+fmt(d.totalRev)+'</span></div><div class="cst">Charges <span style="color:#f87171;">'+fmt(d.totalDep)+'</span></div></div>';
    // Détail par mois
    var moisKeys = Object.keys(d.months);
    moisKeys.sort(function(a,b){ return MOIS_NOMS.indexOf(a)-MOIS_NOMS.indexOf(b); });
    moisKeys.forEach(function(m){
      var md=d.months[m];
      h+='<div style="display:flex;justify-content:space-between;font-size:.72rem;padding:.25rem .4rem;border-bottom:1px solid var(--gris2);">';
      h+='<span style="color:var(--gris);">'+m+'</span>';
      h+='<span style="color:'+(md.net>=0?'#4ade80':'#f87171')+';font-weight:600;">'+(md.net>=0?'+':'')+fmt(md.net)+'</span>';
      h+='</div>';
    });
    h+='</div>';
  });

  if(Object.keys(clientData).length===0){
    h+='<div style="text-align:center;color:var(--gris);padding:1.5rem;font-size:.85rem;">Aucune donnée pour '+year+'</div>';
  }

  h+='<button class="save-btn" style="margin-top:.8rem;" onclick="genRapportAnnuelPDF(\''+year+'\')">📄 Télécharger PDF</button>';
  h+='<button class="cancel-btn" onclick="closeMov()">Fermer</button>';
  document.getElementById('modalbody').innerHTML=h;
}

// ══ MESSAGERIE INTERNE ══
function getMessages(){
  var msgs = load('messages', []);
  // S'assurer que c'est un array (Firebase peut transformer en objet)
  if (msgs && typeof msgs === 'object' && !Array.isArray(msgs)) {
    msgs = Object.values(msgs);
  }
  if (!Array.isArray(msgs)) msgs = [];
  // Auto-suppression après 30 jours (au lieu de 24h) pour garder l'historique
  var now24 = Date.now();
  var expired = [];
  var kept = [];
  msgs.forEach(function(m){
    if(m.ts && (now24 - m.ts) > 30 * 86400000){ expired.push(m); }
    else { kept.push(m); }
  });
  if(expired.length > 0){
    save('messages', kept);
    return kept;
  }
  return msgs;
}
function saveMessages(msgs){ save('messages', msgs); }

function getConvId(a, b){
  // ID de conversation stable entre deux participants
  return [a,b].sort().join('__');
}

function openConvWith(name, targetId){
  // Identifier le destinataire
  var myId = CU.id || 'admin';
  var otherId = targetId || '';
  var otherName = name;

  // Si pas de targetId, chercher dans les clients par nom
  if(!otherId){
    CLIENTS = load('clients', DEFAULT_CLIENTS);
    Object.entries(CLIENTS).forEach(function(e){
      if(e[1].name === name) otherId = e[0];
    });
  }
  // Si toujours pas trouvé et c'est admin dans le nom
  if(!otherId && (name.includes('Admin') || name.includes('admin'))){
    otherId = 'admin';
    otherName = 'ACS — Admin';
  }
  if(!otherId){ showToast('❌ Destinataire introuvable'); return; }
  // Charger le nom correct si c'est un client
  CLIENTS = load('clients', DEFAULT_CLIENTS);
  if(otherId !== 'admin' && CLIENTS[otherId]) otherName = CLIENTS[otherId].name;

  var convId = getConvId(myId, otherId);
  var allMsgs = getMessages();
  var convMsgs = allMsgs.filter(function(m){ return m.conv === convId; });

  // Marquer les messages reçus comme lus
  var changed = false;
  allMsgs.forEach(function(m){
    if(m.conv === convId && m.to === myId && !m.read){ m.read = true; changed = true; }
  });
  if(changed) saveMessages(allMsgs);

  var h='<div class="mh"></div>';
  h+='<div style="display:flex;align-items:center;gap:.7rem;padding-bottom:.8rem;border-bottom:1px solid var(--gris2);margin-bottom:.8rem;">';
  var avInitials = otherId==='admin' ? 'AB' : (CLIENTS[otherId]?CLIENTS[otherId].initials:'?');
  var avBg = otherId==='admin' ? 'linear-gradient(135deg,#7c3aed,#a855f7)' : 'linear-gradient(135deg,#C9950C,#F5D06B)';
  h+='<div class="av" style="width:38px;height:38px;font-size:.8rem;background:'+avBg+';">'+avInitials+'</div>';
  h+='<div><div style="font-weight:600;font-size:.92rem;">'+otherName+'</div>';
  h+='<div style="font-size:.65rem;color:var(--gris);">Messagerie interne ACS</div></div></div>';

  // Zone messages
  h+='<div id="conv-messages" style="max-height:45vh;overflow-y:auto;padding:.5rem 0;margin-bottom:.8rem;">';
  if(convMsgs.length===0){
    h+='<div style="text-align:center;color:var(--gris);font-size:.78rem;padding:2rem 0;">Aucun message. Écrivez le premier !</div>';
  } else {
    convMsgs.forEach(function(m){
      var isMine = m.from === myId;
      h+='<div style="display:flex;justify-content:'+(isMine?'flex-end':'flex-start')+';margin-bottom:.5rem;">';
      h+='<div style="max-width:80%;padding:.55rem .8rem;border-radius:'+(isMine?'10px 10px 2px 10px':'10px 10px 10px 2px')+';background:'+(isMine?'linear-gradient(135deg,rgba(201,149,12,.15),rgba(201,149,12,.08))':'var(--noir3)')+';border:1px solid '+(isMine?'rgba(201,149,12,.3)':'var(--gris2)')+';font-size:.82rem;line-height:1.45;">';
      h+='<div>'+escHtml(m.text)+'</div>';
      h+='<div style="font-size:.58rem;color:var(--gris);margin-top:.25rem;text-align:right;">'+m.time+'</div>';
      h+='</div></div>';
    });
  }
  h+='</div>';

  // Zone saisie
  h+='<div style="display:flex;gap:.5rem;align-items:flex-end;">';
  h+='<textarea id="conv-input" class="form-input" placeholder="Votre message..." rows="2" style="flex:1;resize:none;min-height:40px;" onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();sendMessage(\''+convId+'\',\''+myId+'\',\''+otherId+'\',\''+otherName.replace(/'/g,"\\'")+'\');}"></textarea>';
  h+='<button onclick="sendMessage(\''+convId+'\',\''+myId+'\',\''+otherId+'\',\''+otherName.replace(/'/g,"\\'")+'\') " style="background:linear-gradient(135deg,var(--or),var(--or3));border:none;color:var(--noir);width:42px;height:42px;border-radius:10px;cursor:pointer;font-size:1.1rem;flex-shrink:0;">➤</button>';
  h+='</div>';
  h+='<button class="cancel-btn" style="margin-top:.6rem;" onclick="closeMov();buildThreads();">Fermer</button>';

  document.getElementById('modalbody').innerHTML=h;
  document.getElementById('modal').classList.add('open');

  // Scroll en bas
  setTimeout(function(){
    var el=document.getElementById('conv-messages');
    if(el) el.scrollTop=el.scrollHeight;
  },100);
}

function sendMessage(convId, fromId, toId, otherName){
  var input = document.getElementById('conv-input');
  var text = (input?input.value:'').trim();
  if(!text) return;

  var allMsgs = getMessages();
  var now2 = new Date();
  var timeStr = now2.getHours()+':'+String(now2.getMinutes()).padStart(2,'0');
  allMsgs.push({
    conv: convId,
    from: fromId,
    to: toId,
    text: text,
    time: timeStr,
    date: now2.toLocaleDateString('fr-FR'),
    ts: now2.getTime(),
    read: false
  });
  saveMessages(allMsgs);

  // Rouvrir la conversation pour rafraîchir
  var name = otherName;
  openConvWith(name, toId);
}

function addFriend(){
  var fid = (document.getElementById('friend-id').value||'').trim().toLowerCase();
  if(!fid){showToast('⚠️ Entrez un identifiant');return;}
  var myId = CU.id || 'admin';
  if(fid === myId){showToast('⚠️ Vous ne pouvez pas vous ajouter vous-même');return;}
  if(fid === 'admin'){showToast('⚠️ L\'admin est déjà dans vos contacts');return;}
  CLIENTS = load('clients', DEFAULT_CLIENTS);
  if(!CLIENTS[fid]){showToast('❌ Utilisateur "'+fid+'" introuvable');return;}
  var friends = getFriends(myId);
  if(friends.includes(fid)){showToast('⚠️ '+CLIENTS[fid].name+' est déjà votre ami');return;}
  friends.push(fid);
  saveFriends(myId, friends);
  // Ajouter réciproquement
  var theirFriends = getFriends(fid);
  if(!theirFriends.includes(myId)){
    theirFriends.push(myId);
    saveFriends(fid, theirFriends);
  }
  showToast('✅ '+CLIENTS[fid].name+' ajouté en ami !');
  openAddFriend(); // Rafraîchir
}

function removeFriend(fid){
  var myId = CU.id || 'admin';
  var friends = getFriends(myId);
  friends = friends.filter(function(f){return f!==fid;});
  saveFriends(myId, friends);
  // Retirer réciproquement
  var theirFriends = getFriends(fid);
  theirFriends = theirFriends.filter(function(f){return f!==myId;});
  saveFriends(fid, theirFriends);
  showToast('✅ Ami retiré');
  openAddFriend(); // Rafraîchir
}

// ══ HISTORIQUE ══
function buildRapportFromHistory(x){
  var details = x.details || {};
  return {
    villa  : x.name   || details.villa   || 'Villa',
    mois   : x.period || details.mois    || '',
    rev    : x.rev    || details.rev     || 0,
    deps   : details.deps || [],
    totalDep: x.dep   || details.totalDep|| 0,
    cp     : x.com && x.rev ? Math.round(x.com/x.rev*100) : (details.cp||20),
    com    : x.com    || details.com     || 0,
    net    : x.net    || details.net     || 0,
    client : x.client || details.client  || (CU ? CU.name : '')
  };
}

function histItem(x){
  if(!x) return '';
  const rapport = buildRapportFromHistory(x);
  const pos = rapport.net >= 0;

  // Stocker dans window._rapports avec un ID stable basé sur villa+période
  const rid = 'H_'+(rapport.villa+'_'+rapport.mois).replace(/[^a-zA-Z0-9]/g,'_');
  window._rapports = window._rapports || {};
  window._rapports[rid] = rapport;
  x._rid = rid;

  return '<div class="hi" onclick="openReportAction(\''+rid+'\')" style="cursor:pointer;transition:all .18s;" '
    +'onmouseover="this.style.background=\'rgba(201,149,12,.09)\';this.style.borderColor=\'rgba(201,149,12,.4)\';" '
    +'onmouseout="this.style.background=\'\';this.style.borderColor=\'\';">'
    +'<div class="hico">🏠</div>'
    +'<div style="flex:1;min-width:0;">'
      +'<div class="hin">'+rapport.villa+'</div>'
      +'<div class="him">'+rapport.mois+'</div>'
      +(rapport.rev>0?'<div style="font-size:.65rem;color:var(--gris);margin-top:.15rem;">Revenus : '+fmt(rapport.rev)+'</div>':'')
    +'</div>'

      +'<div style="font-size:.62rem;color:var(--or3);font-weight:600;letter-spacing:.04em;">📄 / ✏️</div>'

function saveEditReport(rid){
  var r = window._rapports && window._rapports[rid];
  if(!r){ showToast('❌ Rapport introuvable'); return; }
  var newRev = parseFloat(document.getElementById('edit-rev').value)||0;
  var newCp = parseFloat(document.getElementById('edit-cp').value)||20;
  var newDeps = [];
  document.querySelectorAll('#edit-deps .edit-dep-row').forEach(function(row){
    var nameInput = row.querySelector('input[id^="ed-name-"]');
    var valInput = row.querySelector('input[id^="ed-val-"]');
    var n = nameInput ? nameInput.value.trim() : '';
    var v = valInput ? parseFloat(valInput.value)||0 : 0;
    if(n && v>0) newDeps.push({n:n, v:v});
  });
  var totalDep = newDeps.reduce(function(s,d){return s+d.v;},0);
  var com = Math.round(newRev * newCp / 100);
  var net = newRev - totalDep - com;

  // Mettre à jour le rapport
  r.rev = newRev;
  r.cp = newCp;
  r.deps = newDeps;
  r.totalDep = totalDep;
  r.com = com;
  r.net = net;

  // Mettre à jour dans l'historique du client
  var cid = CU.id || localStorage.getItem('acs_last_id');
  if(cid && CLIENTS[cid] && CLIENTS[cid].history){
    var found = CLIENTS[cid].history.find(function(h){ return h.name===r.villa && h.period===r.mois; });
    if(found){
      found.rev = newRev;
      found.dep = totalDep;
      found.com = com;
      found.net = net;
      found.pos = net >= 0;
      found.details = {villa:r.villa, mois:r.mois, rev:newRev, deps:newDeps, totalDep:totalDep, cp:newCp, com:com, net:net, client:r.client};
    }
  }

  // Mettre à jour la villa correspondante
  if(CU.villas){
    var villa = CU.villas.find(function(v){ return v.name===r.villa; });
    if(villa){
      villa.rev = newRev;
      villa.dep = newDeps.filter(function(d){ return !['Pisciniste','Jardinier','Internet'].includes(d.n); }).reduce(function(s,d){return s+d.v;},0);
      villa.chg = newDeps.filter(function(d){ return ['Pisciniste','Jardinier','Internet'].includes(d.n); }).reduce(function(s,d){return s+d.v;},0);
      villa.net = net;
      villa.com = com;
      villa.comPct = newCp;
      villa.pos = net >= 0;
    }
  }

  // Sauvegarder
  if(cid && CLIENTS[cid]){
    CLIENTS[cid].villas = CU.villas;
    save('clients', CLIENTS);
  }

  closeMov();
  if(CU.role==='admin') buildAdmin(); else buildClient();
  showToast('✅ Rapport modifié avec succès');
}

function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function fmt(v){
  const n = Math.abs(Math.round(v||0));
  return n.toLocaleString('fr-FR')+' ฿';
}
function fmtPDF(v){
  var n = Math.abs(Math.round(v||0));
  // Séparateur virgule — ASCII pur, compatible jsPDF
  var s = String(n).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return s + ' THB';
}
function fmtPDFb(v){
  // Même chose — THB en toutes lettres, pas de caractère Unicode thaï
  var n = Math.abs(Math.round(v||0));
  var s = String(n).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return s + ' THB';
}
