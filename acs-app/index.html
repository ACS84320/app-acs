<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="ACS">
<title>ACS — Accounting Concierge</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --noir:#080808;--noir2:#121212;--noir3:#1c1c1c;--noir4:#242424;
  --or:#C9950C;--or2:#E8B84B;--or3:#F5D06B;
  --blanc:#f8f6f0;--gris:#777;--gris2:#2a2a2a;--gris3:#444;
  --vert:#16a34a;--rouge:#dc2626;--violet:#7c3aed;
  --r:10px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;}
body{font-family:'DM Sans',sans-serif;background:var(--noir);color:var(--blanc);height:100vh;overflow:hidden;}
.screen{display:none;flex-direction:column;height:100vh;}
.screen.active{display:flex;}

/* LOGIN */
#login{align-items:center;justify-content:center;position:relative;overflow:hidden;}
#login::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(201,149,12,.1) 0%,transparent 70%);top:-80px;right:-80px;pointer-events:none;z-index:0;}
.lw{width:100%;max-width:320px;padding:2rem;z-index:10;position:relative;}
.ll{font-family:'Cormorant Garamond',serif;font-size:4rem;font-weight:700;color:var(--or3);letter-spacing:.15em;text-align:center;line-height:1;animation:fD .6s ease both;}
.lt{text-align:center;font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gris);margin:.3rem 0 .6rem;animation:fD .6s .1s ease both;opacity:0;animation-fill-mode:both;}
.ld{width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--or),transparent);margin:.5rem auto 1.8rem;animation:fD .6s .2s ease both;opacity:0;animation-fill-mode:both;}
@keyframes fD{from{opacity:0;transform:translateY(-14px);}to{opacity:1;transform:translateY(0);}}
@keyframes fU{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes fI{from{opacity:0;}to{opacity:1;}}
.fl{font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--gris);margin-bottom:.35rem;}
.fi{width:100%;background:var(--noir2);border:1px solid var(--gris2);color:var(--blanc);font-family:'DM Sans',sans-serif;font-size:.9rem;padding:.75rem .9rem;border-radius:var(--r);outline:none;transition:border-color .2s;margin-bottom:1.1rem;animation:fU .6s .3s ease both;opacity:0;animation-fill-mode:both;}
.fi:focus{border-color:var(--or);}
.fi::placeholder{color:var(--gris3);}
.ps{animation:fU .6s .35s ease both;opacity:0;animation-fill-mode:both;}
.pd{display:flex;justify-content:center;gap:.7rem;margin-bottom:1.6rem;}
.dot{width:13px;height:13px;border-radius:50%;border:2px solid var(--gris3);transition:all .18s;}
.dot.on{background:var(--or3);border-color:var(--or3);transform:scale(1.1);}
.dot.err{background:var(--rouge);border-color:var(--rouge);}
.dot.ok{background:var(--vert);border-color:var(--vert);}
.pg{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;max-width:240px;margin:0 auto;}
.pk{background:var(--noir2);border:1px solid var(--gris2);color:var(--blanc);font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;padding:.85rem;border-radius:var(--r);cursor:pointer;text-align:center;transition:all .15s;user-select:none;}
.pk:active{background:var(--noir3);border-color:var(--or);color:var(--or3);transform:scale(.93);}
.pk.del{font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--gris);}
.pk.z{grid-column:2;}
.lh{text-align:center;font-size:.68rem;color:var(--gris);margin-top:1.3rem;animation:fI .6s .6s both;line-height:1.6;}
.lh strong{color:var(--or3);}
@keyframes shake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-5px);}40%,80%{transform:translateX(5px);}}
.shake{animation:shake .35s ease;}

/* TOPBAR */
.tb{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.1rem;background:var(--noir2);border-bottom:1px solid var(--gris2);flex-shrink:0;position:relative;z-index:10;}
.tb::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--or),transparent);opacity:.35;}
.tl{font-family:'Cormorant Garamond',serif;font-size:1.65rem;font-weight:700;color:var(--or3);letter-spacing:.1em;}
.tr{display:flex;align-items:center;gap:.6rem;}
.av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--or),var(--or3));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.72rem;color:var(--noir);cursor:pointer;flex-shrink:0;}
.av.adm{background:linear-gradient(135deg,var(--violet),#a855f7);}
.nb{background:none;border:none;color:var(--gris);font-size:1rem;cursor:pointer;position:relative;padding:.2rem;}
.nd{position:absolute;top:0;right:0;width:6px;height:6px;border-radius:50%;background:var(--or);border:1px solid var(--noir2);}

/* NAV */
.nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--noir2);border-top:1px solid var(--gris2);z-index:100;}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:.55rem 0;cursor:pointer;color:var(--gris);transition:color .2s;border:none;background:none;position:relative;}
.ni.on{color:var(--or3);}
.ni.on::before{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:linear-gradient(90deg,transparent,var(--or3),transparent);}
.ni svg{width:18px;height:18px;margin-bottom:2px;}
.ni span{font-size:.52rem;letter-spacing:.05em;text-transform:uppercase;}

/* CONTENT */
.ct{flex:1;overflow-y:auto;padding:1rem 1rem 5.5rem;-webkit-overflow-scrolling:touch;}
.ct::-webkit-scrollbar{width:0;}

/* TYPOGRAPHY */
.h1{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:600;color:var(--or3);line-height:1.1;}
.sub{font-size:.75rem;color:var(--gris);margin-top:.15rem;margin-bottom:1.3rem;}
.sh{font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gris);margin-bottom:.65rem;display:flex;align-items:center;gap:.4rem;}
.sh::after{content:'';flex:1;height:1px;background:var(--gris2);}

/* KPI */
.kr{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:1.2rem;}
.kc{background:var(--noir2);border:1px solid var(--gris2);border-radius:var(--r);padding:.85rem;position:relative;overflow:hidden;}
.kc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--or),var(--or3));}
.kl{font-size:.58rem;color:var(--gris);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.25rem;}
.kv{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;color:var(--or3);}
.kd{font-size:.65rem;color:var(--gris);margin-top:.1rem;}
.kd.up{color:#4ade80;}

/* CARDS */
.vc{background:var(--noir2);border:1px solid var(--gris2);border-radius:var(--r);padding:.85rem .95rem;margin-bottom:.65rem;cursor:pointer;transition:transform .15s,border-color .2s;border-left:3px solid transparent;}
.vc:active{transform:scale(.985);}
.vc.pos{border-left-color:var(--vert);}
.vc.neg{border-left-color:var(--rouge);}
.vt{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.45rem;}
.vn{font-weight:600;font-size:.92rem;}
.vp{font-size:.65rem;color:var(--gris);margin-top:1px;}
.vnet{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;}
.vnet.pos{color:#4ade80;}
.vnet.neg{color:#f87171;}
.chips{display:flex;gap:.4rem;flex-wrap:wrap;}
.chip{font-size:.6rem;color:var(--gris);background:var(--noir3);padding:2px 6px;border-radius:20px;}
.chip span{color:var(--blanc);font-weight:500;}
.vbars{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.35rem;margin-top:.55rem;}
.bl2{font-size:.56rem;color:var(--gris);margin-bottom:2px;}
.bt2{height:3px;background:var(--gris2);border-radius:2px;overflow:hidden;}
.bf{height:100%;border-radius:2px;}
.bf.r{background:var(--or);}
.bf.d{background:#ef4444;}
.bf.n{background:#4ade80;}

/* QUICK BTN */
.qb{display:flex;align-items:center;gap:.85rem;background:linear-gradient(135deg,rgba(201,149,12,.1),rgba(201,149,12,.04));border:1px solid rgba(201,149,12,.35);border-radius:var(--r);padding:.9rem 1rem;margin-bottom:1.2rem;cursor:pointer;transition:opacity .2s;}
.qb:active{opacity:.75;}
.qi{width:40px;height:40px;border-radius:8px;background:linear-gradient(135deg,var(--or),var(--or3));display:flex;align-items:center;justify-content:center;font-size:1.15rem;flex-shrink:0;}
.qt strong{display:block;font-size:.88rem;color:var(--blanc);}
.qt small{font-size:.7rem;color:var(--gris);}
.qa{margin-left:auto;color:var(--or);font-size:1.2rem;}

/* ADMIN */
.abadge{display:inline-flex;align-items:center;gap:.3rem;padding:.22rem .65rem;background:rgba(124,58,237,.12);border:1px solid rgba(168,85,247,.35);border-radius:20px;font-size:.65rem;color:#c084fc;margin-bottom:1.1rem;}
.ak3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.55rem;margin-bottom:1.2rem;}
.ak{background:var(--noir2);border:1px solid var(--gris2);border-radius:var(--r);padding:.7rem .5rem;text-align:center;}
.akv{font-family:'Cormorant Garamond',serif;font-size:1.45rem;font-weight:700;color:var(--or3);}
.akl{font-size:.55rem;color:var(--gris);letter-spacing:.08em;text-transform:uppercase;margin-top:1px;}
.cc{background:var(--noir2);border:1px solid var(--gris2);border-radius:var(--r);padding:.85rem .95rem;margin-bottom:.65rem;}
.cct{display:flex;justify-content:space-between;align-items:center;margin-bottom:.45rem;}
.ccn{font-weight:600;font-size:.92rem;}
.ccp{font-size:.6rem;padding:.18rem .55rem;border-radius:20px;font-weight:500;}
.ccp.b{background:rgba(201,149,12,.12);color:var(--or3);border:1px solid rgba(201,149,12,.3);}
.ccp.s{background:rgba(29,78,216,.12);color:#93c5fd;border:1px solid rgba(29,78,216,.3);}
.ccp.p{background:rgba(124,58,237,.12);color:#c084fc;border:1px solid rgba(124,58,237,.3);}
.ccs{display:flex;gap:.7rem;margin-bottom:.6rem;}
.cst{font-size:.68rem;color:var(--gris);}
.cst span{color:var(--blanc);font-weight:500;}
.cca{display:flex;gap:.4rem;}
.cb{flex:1;padding:.42rem;border-radius:6px;font-size:.65rem;font-weight:600;cursor:pointer;border:none;text-align:center;transition:opacity .2s;}
.cb:active{opacity:.8;}
.cb.v{background:var(--gris2);color:var(--blanc);}
.cb.m{background:rgba(201,149,12,.12);color:var(--or3);border:1px solid rgba(201,149,12,.3);}
.cb.r2{background:linear-gradient(135deg,var(--or),var(--or3));color:var(--noir);}
.cb.del{background:rgba(220,38,38,.1);color:#f87171;border:1px solid rgba(220,38,38,.25);}

/* ADD CLIENT BTN */
.add-btn{display:flex;align-items:center;justify-content:center;gap:.5rem;width:100%;padding:.85rem;background:transparent;border:1px dashed rgba(201,149,12,.4);border-radius:var(--r);color:var(--or3);font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .2s;margin-top:.3rem;}
.add-btn:active{background:rgba(201,149,12,.08);}

/* CHAT */
.cw{display:flex;flex-direction:column;height:calc(100vh - 56px - 56px);overflow:hidden;}
.ch{padding:.8rem 1rem;background:var(--noir2);border-bottom:1px solid var(--gris2);flex-shrink:0;}
.chn{font-weight:600;font-size:.9rem;}
.cho{font-size:.67rem;color:#4ade80;display:flex;align-items:center;gap:3px;}
.cho::before{content:'';width:5px;height:5px;border-radius:50%;background:#4ade80;display:inline-block;}
.cm{flex:1;overflow-y:auto;padding:.85rem .9rem;display:flex;flex-direction:column;gap:.65rem;}
.cm::-webkit-scrollbar{width:0;}
.msg{max-width:83%;display:flex;flex-direction:column;gap:2px;}
.msg.bot{align-self:flex-start;}
.msg.usr{align-self:flex-end;}
.bb{padding:.65rem .85rem;border-radius:11px;font-size:.83rem;line-height:1.5;}
.bot .bb{background:var(--noir2);border:1px solid var(--gris2);border-radius:4px 11px 11px 11px;}
.usr .bb{background:linear-gradient(135deg,var(--or),var(--or3));color:var(--noir);font-weight:500;border-radius:11px 11px 4px 11px;}
.mt{font-size:.56rem;color:var(--gris);}
.bot .mt{text-align:left;}
.usr .mt{text-align:right;}
.rc{background:var(--noir3);border:1px solid var(--or);border-radius:8px;padding:.7rem;margin-top:.35rem;}
.rct{font-size:.72rem;font-weight:600;color:var(--or3);margin-bottom:.35rem;}
.rr{display:flex;justify-content:space-between;font-size:.73rem;padding:2px 0;border-bottom:1px solid var(--gris2);}
.rr:last-of-type{border:none;font-weight:700;color:var(--or3);}
.rn{color:#f87171;}
.rb{display:flex;gap:.35rem;margin-top:.55rem;}
.rbtn{flex:1;padding:.4rem;border-radius:5px;font-size:.65rem;font-weight:600;cursor:pointer;border:none;}
.rbtn.g{background:linear-gradient(135deg,var(--or),var(--or3));color:var(--noir);}
.rbtn.s{background:var(--gris2);color:var(--blanc);}
.sugs{display:flex;gap:.4rem;padding:.45rem .8rem;overflow-x:auto;background:var(--noir2);border-top:1px solid var(--gris2);flex-shrink:0;scrollbar-width:none;}
.sugs::-webkit-scrollbar{width:0;}
.sg{flex-shrink:0;padding:.3rem .7rem;background:var(--noir3);border:1px solid var(--gris2);border-radius:16px;font-size:.68rem;color:var(--gris);cursor:pointer;white-space:nowrap;}
.sg:active{background:rgba(201,149,12,.12);border-color:var(--or);color:var(--or3);}
.cbar{padding:.65rem .85rem;background:var(--noir2);border-top:1px solid var(--gris2);display:flex;gap:.45rem;align-items:flex-end;flex-shrink:0;}
.cin{flex:1;background:var(--noir3);border:1px solid var(--gris2);color:var(--blanc);font-family:'DM Sans',sans-serif;font-size:.83rem;padding:.58rem .8rem;border-radius:17px;outline:none;resize:none;max-height:85px;transition:border-color .2s;line-height:1.4;}
.cin:focus{border-color:var(--or);}
.sbtn{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--or),var(--or3));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sbtn:active{transform:scale(.9);}
.sbtn svg{width:15px;height:15px;fill:var(--noir);}
.typ{display:flex;gap:3px;align-items:center;padding:.35rem 0;}
.typ span{width:5px;height:5px;border-radius:50%;background:var(--gris);animation:b 1.1s infinite;}
.typ span:nth-child(2){animation-delay:.18s;}
.typ span:nth-child(3){animation-delay:.36s;}
@keyframes b{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-5px);}}

/* HISTORIQUE */
.mg{margin-bottom:1.3rem;}
.ml{font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gris);margin-bottom:.55rem;display:flex;align-items:center;gap:.4rem;}
.ml::after{content:'';flex:1;height:1px;background:var(--gris2);}
.hi{display:flex;align-items:center;gap:.75rem;background:var(--noir2);border:1px solid var(--gris2);border-radius:var(--r);padding:.75rem .85rem;margin-bottom:.45rem;cursor:pointer;}
.hi:active{border-color:var(--or);}
.hico{width:34px;height:34px;border-radius:7px;background:rgba(201,149,12,.08);border:1px solid rgba(201,149,12,.25);display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0;}
.hin{font-size:.85rem;font-weight:600;margin-bottom:1px;}
.him{font-size:.65rem;color:var(--gris);}
.hr2{text-align:right;}
.ha{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;}
.ft{display:inline-block;padding:1px 5px;background:var(--gris2);border-radius:3px;font-size:.55rem;margin-right:2px;color:var(--gris);}

/* MESSAGES */
.th{display:flex;align-items:center;gap:.75rem;padding:.85rem 1rem;border-bottom:1px solid var(--gris2);cursor:pointer;}
.th:active{background:var(--noir2);}
.tav{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;color:var(--noir);flex-shrink:0;position:relative;}
.tod{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;background:#4ade80;border:2px solid var(--noir);}
.ti{flex:1;min-width:0;}
.tn{font-size:.88rem;font-weight:600;margin-bottom:2px;}
.tp{font-size:.73rem;color:var(--gris);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tm{text-align:right;flex-shrink:0;}
.tt{font-size:.63rem;color:var(--gris);margin-bottom:3px;}
.tbadge{display:inline-flex;align-items:center;justify-content:center;min-width:17px;height:17px;border-radius:9px;background:var(--or);color:var(--noir);font-size:.6rem;font-weight:700;padding:0 3px;}

/* CONV */
#cv{display:none;flex-direction:column;position:fixed;inset:0;background:var(--noir);z-index:200;}
#cv.open{display:flex;}
.cvb{display:flex;align-items:center;gap:.75rem;padding:.75rem .9rem;background:var(--noir2);border-bottom:1px solid var(--gris2);flex-shrink:0;}
.bk{background:none;border:none;color:var(--or3);font-size:1.4rem;cursor:pointer;line-height:1;}
.cvi{flex:1;}
.cvn{font-weight:600;font-size:.88rem;}
.cvs{font-size:.68rem;color:#4ade80;}

/* PROFIL */
.ph{text-align:center;padding:1.7rem 1rem 1.2rem;background:var(--noir2);border-bottom:1px solid var(--gris2);margin:-1rem -1rem 1.2rem;}
.pav{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;color:var(--noir);margin:0 auto .65rem;}
.pn{font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:600;color:var(--or3);}
.pr{font-size:.73rem;color:var(--gris);margin-top:.15rem;}
.pp{display:inline-flex;align-items:center;gap:.3rem;margin-top:.65rem;padding:.22rem .75rem;background:rgba(201,149,12,.08);border:1px solid rgba(201,149,12,.25);border-radius:20px;font-size:.7rem;color:var(--or3);}
.mi{display:flex;align-items:center;gap:.8rem;padding:.8rem 0;border-bottom:1px solid var(--gris2);cursor:pointer;}
.mii{width:32px;height:32px;border-radius:7px;background:var(--noir2);display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;}
.mit{flex:1;}
.miT{font-size:.86rem;font-weight:500;}
.miD{font-size:.68rem;color:var(--gris);margin-top:1px;}
.lob{width:100%;padding:.82rem;background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.25);color:#f87171;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;letter-spacing:.1em;border-radius:var(--r);cursor:pointer;margin-top:.9rem;}

/* MODAL */
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:300;align-items:flex-end;}
.mov.open{display:flex;}
.ms{background:var(--noir2);border-radius:14px 14px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:1.2rem 1rem 2.5rem;animation:sU .25s ease;}
@keyframes sU{from{transform:translateY(100%);}to{transform:translateY(0);}}
.mh{width:28px;height:3px;border-radius:2px;background:var(--gris2);margin:0 auto .9rem;}
.mt2{font-family:'Cormorant Garamond',serif;font-size:1.45rem;color:var(--or3);margin-bottom:.15rem;}
.mp{font-size:.73rem;color:var(--gris);margin-bottom:1rem;}
.ds{margin-bottom:.85rem;}
.dh{display:flex;justify-content:space-between;padding:.42rem .75rem;background:var(--noir3);border-radius:5px;font-size:.76rem;font-weight:600;color:var(--or3);margin-bottom:.18rem;}
.dr{display:flex;justify-content:space-between;padding:.3rem .75rem;font-size:.78rem;border-bottom:1px solid var(--gris2);}
.dr:last-child{border:none;}
.dr .v{color:var(--blanc);}
.nb2{display:flex;justify-content:space-between;align-items:center;padding:.85rem .95rem;border-radius:var(--r);margin:.9rem 0;}
.nb2.pos{background:rgba(22,163,74,.08);border:1px solid rgba(22,163,74,.25);}
.nb2.neg{background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.25);}
.nl{font-size:.75rem;font-weight:600;}
.na{font-family:'Cormorant Garamond',serif;font-size:1.85rem;font-weight:700;}
.nb2.pos .na{color:#4ade80;}

<script>
// ══ STORAGE ══
function save(k,v){try{localStorage.setItem('acs_'+k,JSON.stringify(v));}catch(e){}}
function load(k,def){try{const v=localStorage.getItem('acs_'+k);return v?JSON.parse(v):def;}catch(e){return def;}}

// ══ DEFAULT DATA ══
const DEFAULT_CLIENTS = {};

// Load or init clients
let CLIENTS = load('clients', DEFAULT_CLIENTS);
const ADMIN = {pin:'0000',role:'admin',name:'Alexis B.',initials:'AB',plan:'Admin'};

let CU=null, botStep=0; // pin déjà déclaré en haut

// ══ PIN ══
// pk, pdel, updDots déclarés en haut du document
function tryLogin(){
  // Toujours recharger depuis localStorage (multi-device safe)
  CLIENTS = load('clients', DEFAULT_CLIENTS);
  const id=document.getElementById('lid').value.trim().toLowerCase();
  let user=null;
  if(id==='admin'&&ADMIN.pin===pin){user={...ADMIN,id:'admin'};}
  else if(CLIENTS[id]&&CLIENTS[id].pin===pin){user={...CLIENTS[id],id};}
  if(user){
    for(let i=0;i<4;i++)document.getElementById('d'+i).className='dot ok';
    // Sauvegarder identifiant + session
    try{
      localStorage.setItem('acs_last_id', id);
      sessionStorage.setItem('acs_session', id); // session active
    }catch(e){}
    setTimeout(()=>{
      CU=user;
      // Email : on vérifie si déjà renseigné OU déjà vu
      const _emailDone = localStorage.getItem('acs_email_done_'+id);
      const _emailVal  = localStorage.getItem('acs_email_'+id) || (CLIENTS[id]&&CLIENTS[id].email);
      if(!_emailDone && !_emailVal && user.role !== 'admin') {
        showEmailCapture(id, user);
      } else {
        // Marquer comme fait si email déjà connu
        if(_emailVal && !_emailDone) localStorage.setItem('acs_email_done_'+id,'1');
        initApp();
      }
    },380);
  }else{
    for(let i=0;i<4;i++)document.getElementById('d'+i).className='dot err';
    document.getElementById('pgrid').classList.add('shake');
    setTimeout(()=>{pin='';updDots();document.getElementById('pgrid').classList.remove('shake');},500);
  }
}
document.getElementById('lid').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('lid').blur();});
document.getElementById('lid').addEventListener('input',()=>{pin='';updDots();});
// Touch géré nativement par les boutons

// ══ APP INIT ══
function initApp(){
  document.getElementById('login').classList.remove('active');
  document.getElementById('app').classList.add('active');
  const av=document.getElementById('topav');
  av.textContent=CU.initials;
  av.className=CU.role==='admin'?'av adm':'av';
  CU.role==='admin'?buildAdmin():buildClient();
  buildProfile();buildThreads();
  initChat();goPage('dash');
  if(CU.role!=='admin') initNotifications();
  setTimeout(updateApiKeyUI, 100);
}

// ══ CLIENT ══
function buildClient(){
  const u=CU;
  if(!u){ console.error('buildClient: CU is null'); return; }
  if(!u.villas) u.villas=[];
  if(!u.history) u.history=[];
  const totalRev=u.villas.reduce((s,v)=>s+(v.rev||0),0);
  const totalNet=u.villas.reduce((s,v)=>s+(v.net||0),0);
  const totalCom=u.villas.reduce((s,v)=>s+(v.com||0),0);
  const comPct=totalRev>0?Math.round(totalCom/totalRev*100):0;
  let h=`<div class="h1">Bonjour, ${u.name.split(' ')[0]} 👋</div>
  <div class="sub">Février 2026 · ${u.villas.length} villa${u.villas.length>1?'s':''}</div>
  <div class="kr">
    <div class="kc"><div class="kl">Revenus Fév.</div><div class="kv">${fmt(totalRev)}</div><div class="kd up">Ce mois</div></div>
    <div class="kc"><div class="kl">Bénéfice net</div><div class="kv">${fmt(totalNet)}</div><div class="kd ${totalNet>0?'up':''}">${u.villas.length} villa${u.villas.length>1?'s':''}</div></div>
  </div>
  <div class="kc" style="margin-bottom:1.2rem;background:linear-gradient(135deg,rgba(201,149,12,.12),rgba(201,149,12,.04));border-color:rgba(201,149,12,.35);">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div><div class="kl">💰 Commissions générées</div><div class="kv">${fmt(totalCom)}</div><div class="kd up">${comPct}% des revenus bruts</div></div>
      <div style="text-align:right;">
        <div style="font-size:.6rem;color:var(--gris);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.3rem;">Détail par villa</div>
        ${u.villas.map(v=>`<div style="font-size:.72rem;color:var(--gris);margin-bottom:2px;">${v.name} <span style="color:var(--or3);font-weight:600">${fmt(v.com)}</span></div>`).join('')}
      </div>
    </div>
    <div style="margin-top:.6rem;height:4px;background:var(--gris2);border-radius:2px;overflow:hidden;">
      <div style="height:100%;width:${comPct}%;background:linear-gradient(90deg,var(--or),var(--or3));border-radius:2px;"></div>
    </div>
  </div>
  <div class="qb" onclick="openDeclaration()" style="border-color:rgba(201,149,12,.5);background:rgba(201,149,12,.07);"><div class="qi">📋</div><div class="qt"><strong>Déclarer ce mois</strong><small>Formulaire guidé — rapide et simple</small></div><div class="qa">›</div></div>
  <div class="qb" onclick="goPage('chat')"><div class="qi">💬</div><div class="qt"><strong>Assistant ACS</strong><small>Chat libre avec l'assistant IA</small></div><div class="qa">›</div></div>
  <div class="sh">Mes villas</div>`;
  h += `<button class="add-btn" onclick="openAddVilla()" style="margin-bottom:.8rem;">＋ Ajouter une villa</button>`;
  u.villas.forEach(v=>{
    const rp=Math.min(100,Math.round((v.dep+v.chg)/v.rev*100));
    const rn=Math.max(0,Math.round(v.net/v.rev*100));
    h+=`<div class="vc ${v.pos?'pos':'neg'}" onclick="openVilla('${v.id}')">
      <div class="vt"><div><div class="vn">${v.name}</div><div class="vp">${v.period}</div></div>
      <div class="vnet ${v.pos?'pos':'neg'}">${v.pos?'+':''}${fmt(v.net)}</div></div>
      <div class="chips"><div class="chip">Revenus <span>${fmt(v.rev)}</span></div><div class="chip">Charges <span>${fmt(v.dep+v.chg)}</span></div><div class="chip">Commission <span>${fmt(v.com)}</span></div></div>
      <div class="vbars"><div><div class="bl2">Revenus</div><div class="bt2"><div class="bf r" style="width:100%"></div></div></div>
      <div><div class="bl2">Dépenses</div><div class="bt2"><div class="bf d" style="width:${rp}%"></div></div></div>
      <div><div class="bl2">NET</div><div class="bt2"><div class="bf n" style="width:${rn}%"></div></div></div></div></div>`;
  });
  document.getElementById('pg-dash').innerHTML=h;

  // Historique
  let hh='';
  const groups={};
  u.history.forEach(x=>{if(!groups[x.period])groups[x.period]=[];groups[x.period].push(x);});
  Object.keys(groups).forEach(period=>{
    hh+=`<div class="mg"><div class="ml">${period}</div>`;
    groups[period].forEach(x=>{hh+=histItem(x);});
    hh+=`</div>`;
  });
  document.getElementById('pg-hist').innerHTML=`<div class="h1">Historique</div><div class="sub">Tous vos rapports mensuels</div>${hh}`;
}

// ══ ADMIN ══
function buildAdmin(){
  // Recharger CLIENTS et s'assurer que chaque client a son id
  CLIENTS = load('clients', DEFAULT_CLIENTS);
  Object.keys(CLIENTS).forEach(function(k){ if(!CLIENTS[k].id) CLIENTS[k].id = k; });
  const clients=Object.values(CLIENTS);
  const totalRev=clients.reduce((s,c)=>s+(c.villas?c.villas.reduce((a,v)=>a+v.rev,0):0),0);
  const totalNet=clients.reduce((s,c)=>s+(c.villas?c.villas.reduce((a,v)=>a+v.net,0):0),0);
  let h=`<div class="h1">Dashboard Admin 👑</div>
  <div class="sub">Vue globale · ${clients.length} client${clients.length>1?'s':''}</div>
  <div class="abadge">👑 Accès Administrateur</div>
  <div class="ak3">
    <div class="ak"><div class="akv">${clients.length}</div><div class="akl">Clients</div></div>
    <div class="ak"><div class="akv">${clients.reduce((s,c)=>s+(c.villas?c.villas.length:0),0)}</div><div class="akl">Villas</div></div>
    <div class="ak"><div class="akv">${fmt(totalNet).replace(' ฿','')}</div><div class="akl">Net total</div></div>
  </div>
  <div class="kr">
    <div class="kc"><div class="kl">Total revenus</div><div class="kv">${fmt(totalRev)}</div><div class="kd up">${clients.length} clients</div></div>
    <div class="kc"><div class="kl">Net global</div><div class="kv">${fmt(totalNet)}</div><div class="kd up">Fév. 2026</div></div>
  </div>
  <div class="sh">Clients actifs</div>`;
  clients.forEach(function(c){
    const cid = c.id || Object.keys(CLIENTS).find(function(k){ return CLIENTS[k]===c; }) || '';
    const cv=c.villas?c.villas.length:0;
    const cr=c.villas?c.villas.reduce((s,v)=>s+(v.rev||0),0):0;
    const cn=c.villas?c.villas.reduce((s,v)=>s+(v.net||0),0):0;
    h+=`<div class="cc">
      <div class="cct"><div class="ccn">${c.name}</div><span class="ccp b">ACS</span></div>
      <div class="ccs"><div class="cst">Revenus <span>${fmt(cr)}</span></div><div class="cst">NET <span style="color:${cn>=0?'#4ade80':'#f87171'}">${cn>=0?'+':''}${fmt(cn)}</span></div><div class="cst">Villas <span>${cv}</span></div></div>
      <div class="cca">
        <div class="cb v" onclick="viewClient('${cid}')">👁 Voir</div>
        <div class="cb m" onclick="openConvWith('${c.name}')">💬 Message</div>
        <div class="cb r2" onclick="showToast('Rapport ${c.name} généré !')">📄 Rapport</div>
        <div class="cb del" onclick="confirmDelete('${cid}')">🗑</div>
      </div>
    </div>`;
  });
  h+=`<button class="add-btn" onclick="openAddClient()">＋  Ajouter un client</button>
  <button class="add-btn" onclick="openAddVilla('admin')" style="margin-top:.5rem;">🏠  Ajouter une villa à un client</button>`;
  document.getElementById('pg-dash').innerHTML=h;

  // Historique admin
  let hh=`<div class="h1">Historique</div><div class="sub">Tous les clients</div><div class="abadge">👑 Vue globale</div>`;
  clients.forEach(c=>{
    if(!c.history||!c.history.length)return;
    hh+=`<div class="mg"><div class="ml">${c.name}</div>`;
    c.history.forEach(x=>{hh+=histItem(x);});
    hh+=`</div>`;
  });
  document.getElementById('pg-hist').innerHTML=hh;
}

function viewClient(id){
  const c=CLIENTS[id]; if(!c)return;
  const prev=CU;
  CU={...c,id};
  buildClient();
  CU=prev;
  showToast(`Vue de ${c.name}`);
}

// ══ ADD CLIENT ══
// ══ AJOUTER UNE VILLA ══
function openAddVilla(mode){
  // mode = 'admin' ou undefined (client)
  let clientOptions = '';
  if(mode==='admin'){

function togglePlat(el,k){el.classList.toggle('on');}
function selectNbr(el,n,id){document.querySelectorAll('.nbr-chip').forEach(x=>x.classList.remove('on'));el.classList.add('on');document.getElementById(id).value=n;}
function addExtraCharge(){
  const div=document.createElement('div');div.className='charge-row';
  div.innerHTML='<input class="form-input" placeholder="Nom charge" style="flex:1.5;"/><input class="form-input charge-input" type="number" placeholder="0 ฿" style="flex:1;"/><button onclick="this.parentNode.remove()" style="background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.3);color:#f87171;border-radius:6px;padding:.4rem .6rem;cursor:pointer;">✕</button>';
  document.getElementById('extra-charges').appendChild(div);
}
function avNext(step){
  if(step===1){
    const name=document.getElementById('av-name').value.trim();
    const com=document.getElementById('av-com').value;
    if(!name){showToast('⚠️ Donnez un nom à la villa');return;}
    if(!com||com<1||com>50){showToast('⚠️ Commission entre 1 et 50%');return;}
    document.getElementById('av-page-1').style.display='none';
    document.getElementById('av-page-2').style.display='block';
    document.getElementById('av-step-2-ind').style.background='var(--or3)';
  } else if(step===2){
    document.getElementById('av-page-2').style.display='none';
    document.getElementById('av-page-3').style.display='block';
    document.getElementById('av-step-3-ind').style.background='var(--or3)';
  }
}
function avBack(step){
  if(step===2){
    document.getElementById('av-page-2').style.display='none';
    document.getElementById('av-page-1').style.display='block';
    document.getElementById('av-step-2-ind').style.background='var(--gris2)';
  } else if(step===3){
    document.getElementById('av-page-3').style.display='none';
    document.getElementById('av-page-2').style.display='block';
    document.getElementById('av-step-3-ind').style.background='var(--gris2)';
  }
}
function avSave(mode){
  const name=document.getElementById('av-name').value.trim();
  const comPct=parseInt(document.getElementById('av-com').value)||0;
  const chambres=document.getElementById('av-chambres').value;
  const capa=document.getElementById('av-capa').value;
  const note=document.getElementById('av-note').value.trim();
  const owner=document.getElementById('av-owner').value.trim();

  // Plateformes
  const plats=[...document.querySelectorAll('.plat-chip.on')].map(x=>x.textContent);

  // Charges fixes
  const charges={};
  document.querySelectorAll('#charges-list .charge-row').forEach(row=>{
    const key=row.dataset.key;
    const val=parseInt(row.querySelector('.charge-input').value)||0;
    if(val>0) charges[key]=val;
  });
  // Charges extra
  document.querySelectorAll('#extra-charges .charge-row').forEach(row=>{
    const inputs=row.querySelectorAll('input');
    const key=inputs[0].value.trim();
    const val=parseInt(inputs[1].value)||0;
    if(key&&val>0) charges[key]=val;
  });
  const totalCharges=Object.values(charges).reduce((s,v)=>s+v,0);

  // Construire la villa
  const vid=(name.toLowerCase().replace(/\s+/g,'-')+'-'+Date.now());
  const sections=[
    {t:'Revenus',items:[['En attente de données','0 ฿']],total:'0 ฿'},
  ];
  if(totalCharges>0){
    sections.push({t:'Charges fixes mensuelles',items:Object.entries(charges).map(([k,v])=>[k.charAt(0).toUpperCase()+k.slice(1),fmt(v)]),total:fmt(totalCharges)});
  }
  sections.push({t:'Commission',items:[['Taux : '+comPct+'%','Calculé sur revenus bruts']],total:comPct+'%'});

  const villa={
    id:vid, name, period:'', pos:true, net:0, rev:0,
    dep:0, chg:totalCharges, com:0, comPct,
    charges, plats, chambres, capa, note, owner,
    sections
  };

  // Déterminer le client cible
  let targetId;
  if(mode==='admin'){
    targetId=document.getElementById('av-client').value;
  } else {
    targetId=CU.id;
  }

  if(!CLIENTS[targetId]){showToast('⚠️ Client introuvable');return;}
  if(!CLIENTS[targetId].villas) CLIENTS[targetId].villas=[];
  CLIENTS[targetId].villas.push(villa);
  save('clients',CLIENTS);

  // Recharger l'interface
  if(CU.role==='admin'){
    if(targetId===CU.id) CU=CLIENTS[targetId];
    buildAdmin();
  } else {
    CU={...CLIENTS[targetId],id:targetId};
    buildClient();
  }
  closeMov();
  showToast('✅ Villa "'+name+'" ajoutée avec succès !');
}

let fcpin='';
function addPinDigit(n,id){
  if(fcpin.length>=4)return;
  fcpin+=String(n);
  document.getElementById(id).value=fcpin;
  updateFcPin();
}
function delPinDigit(id){
  fcpin=fcpin.slice(0,-1);
  document.getElementById(id).value=fcpin;
  updateFcPin();
}
function updateFcPin(){
  for(let i=0;i<4;i++){
    const el=document.getElementById('fpc'+i);
    if(el) el.textContent=i<fcpin.length?fcpin[i]:'·';
  }
}

function saveNewClient(){
  // Toujours recharger depuis localStorage pour avoir les dernières données
  CLIENTS = load('clients', DEFAULT_CLIENTS);
  const name=document.getElementById('fc-name').value.trim();
  let id=document.getElementById('fc-id').value.trim().toLowerCase().replace(/[^a-z0-9._-]/g,'').replace(/\s+/g,'.');
  const init=(document.getElementById('fc-init')?document.getElementById('fc-init').value.trim().toUpperCase().slice(0,2):name.slice(0,2).toUpperCase());
  // PIN : utiliser fcpin OU la valeur du champ caché
  const pinVal = fcpin.length===4 ? fcpin : (document.getElementById('fc-pin')?document.getElementById('fc-pin').value:'');
  const plan='ACS';
  const villa=(document.getElementById('fc-villa')?document.getElementById('fc-villa').value.trim():'');

  if(!name){showToast('⚠️ Entrez le nom du client');return;}
  if(!id){showToast('⚠️ Entrez un identifiant (ex: jean.dupont)');return;}
  if(pinVal.length!==4){showToast('⚠️ PIN : entrez exactement 4 chiffres');return;}
  if(CLIENTS[id]||id==='admin'){showToast('⚠️ Identifiant "'+id+'" déjà utilisé — choisissez-en un autre');return;}

  const initials2 = init || name.split(' ').map(function(w){return w[0];}).join('').toUpperCase().slice(0,2) || 'CL';
  const villas2 = villa ? [{id:id+'_v1',name:villa,comPct:20,charges:{},plats:['Airbnb'],period:'',pos:true,net:0,rev:0,dep:0,chg:0,com:0,history:[]}] : [];
  const newClient={
    pin:String(pinVal), role:'client', name:name, initials:initials2,
    plan:'ACS', planLabel:'Formule ACS', id:id,
    villas: villas2,
    history:[],
    email:''
  };

  newClient.id = id; // Stocker l'id dans l'objet pour référence rapide
  CLIENTS[id]=newClient;
  save('clients',CLIENTS);
  fcpin='';
  // Réinitialiser les dots PIN du formulaire
  for(let i=0;i<4;i++){ const el=document.getElementById('fc-d'+i); if(el) el.className='dot'; }
  const pinDisplay = document.getElementById('fc-pin'); if(pinDisplay) pinDisplay.value='';
  closeMov();
  buildAdmin();
  showToast('✅ Client '+name+' créé ! Identifiant : '+id+' · PIN : '+pinVal);
}

function loadChatHistory(){
  if(!CU||CU.role==='admin') return false;
  try{
    const raw=localStorage.getItem('acs_chat_'+CU.id);
    if(!raw) return false;
    const data=JSON.parse(raw);
    // Expirer après 24h
    if(Date.now()-data.ts > 24*60*60*1000){
      localStorage.removeItem('acs_chat_'+CU.id);
      return false;
    }
    const msgs=document.getElementById('chatmsgs');

function norm(s){
  // Normalise: accents, majuscules, espaces multiples
  return s.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9\s%]/g,' ')
    .replace(/\s+/g,' ').trim();
}

function analyzeMsg(txt){
  var t=norm(txt);
  var hasNum=/\d/.test(txt);
  // Revenus — très flexible
  var hasAirbnb=/airbnb|air bnb|booking|agoda|sejour|location|loyer|revenu|rent/i.test(t);
  // Commission — flexible
  var hasCom=/commission|com|%|pourcent|taux/.test(t);
  // Ajout villa
  var hasAjout=(/ajouter|nouvel|creer|nouveau|add/.test(t))&&(/villa|propriete|maison|appart/.test(t));
  // Correction
  var hasCorrect=/corrig|modif|erreur|rectif|changer|faux|mauvais/.test(t);
  // Bilan
  var hasBilan=/bilan|annuel|annee|2024|2025|2026|recap/.test(t);
  // Salutations
  var hasBonjour=/bonjour|salut|hello|bonsoir|coucou|hi/.test(t);
  var hasMerci=/merci|thank|super|parfait|nickel|cool/.test(t);
  var hasAide=/aide|comment|utiliser|help|\?/.test(t);
  // Mois — très flexible y compris abréviations et fautes
  var hasMois=/janv?|fevr?|fev|mars|avr?|mai|juin|juil?|aout|aou|sept?|oct|nov|dec|mois/i.test(t);
  if(hasBonjour) return 'salut';
  if(hasMerci) return 'merci';
  if(hasAide&&!hasNum) return 'aide';
  if(hasAjout) return 'ajout';
  if(hasCorrect) return 'correction';
  if(hasBilan) return 'bilan';
  if(hasAirbnb&&hasNum&&hasCom) return 'rapport_ok';
  if(hasAirbnb&&hasNum) return 'rapport_incomplet';
  if(hasNum&&hasMois) return 'rapport_incomplet';
  return 'inconnu';
}
function parseData(txt){
  var t = txt;
  // Extraire nom villa (avant la virgule ou les deux-points)
  var villaM = t.match(/^([^,:\n]+)[,:]/) || t.match(/villa\s+([^,:\s]+)/i);
  var villa = villaM ? villaM[1].trim() : 'Villa';
  // Mois — très flexible, abréviations, fautes
  var moisRx = /jan(?:vier)?|fev(?:rier)?|f[ée]v|mars?|avr(?:il)?|mai|juin|juil(?:let)?|ao[uû]t?|sep(?:t(?:embre)?)?|oct(?:obre)?|nov(?:embre)?|d[eé]c(?:embre)?/i;
  var moisM = t.match(moisRx);
  var mois = moisM ? moisM[0] : 'ce mois';
  // Année optionnelle
  var anneeM = t.match(/20\d\d/); if(anneeM) mois += ' '+anneeM[0];
  // Revenus — ignorer le nb de séjours, prendre le GROS montant après la plateforme
  var rev=0;
  // Pattern: plateforme [X séjours/nuits] MONTANT
  // On cherche le plus grand nombre après la plateforme (le montant, pas le nb de séjours)
  var revRx=/(?:airbnb|air\s*bnb|booking|agoda|direct|location|loyer|revenu|rent|recette)((?:[^\d]|\d{1,2}(?:\s*s[eé]jours?|\s*nuits?))*)(\d[\d\s.,]*)/gi;
  var rm; while((rm=revRx.exec(t))!==null){
    var val=parseInt(rm[3].replace(/[\s.,]/g,''));
    if(val>=1000) rev+=val; // seulement les vrais montants (>=1000 ฿)
  }
  // Fallback: chercher tous les nombres >= 1000 qui ne sont pas des dépenses
  if(rev===0){
    var allNums=t.match(/\d[\d\s]{3,}/g)||[];
    allNums.forEach(function(n){ var v=parseInt(n.replace(/\s/g,'')); if(v>=10000) rev=Math.max(rev,v); });
  }
  // Dépenses — très flexible
  var deps=[];
  var depRx=/(pisci?ni?ste?|piscine|pool|jardini?er?|jardinage|elec(?:tricit[eé])?|electricit[eé]|eau|water|m[eé]nage?|nettoyage|cleaning|entretien|maintenance|r[eé]paration|repare?|internet|wifi|assurance|taxe?|charge|divers)[^\d฿]*(\d[\d\s.]*)/gi;
  var dm; while((dm=depRx.exec(t))!==null){
    var val=parseInt(dm[2].replace(/[\s.]/g,''));
    if(val>0) deps.push({n:dm[1].charAt(0).toUpperCase()+dm[1].slice(1),v:val});
  }
  var totalDep=deps.reduce(function(s,d){return s+d.v;},0);
  // Commission — très flexible: com, commission, %, taux
  var cpM=t.match(/(?:commission|com(?:ission)?|taux)[^\d]*(\d+)\s*%/i)||t.match(/(\d+)\s*%/);
  var cp=cpM?parseInt(cpM[1]):0;
  var com=rev>0&&cp>0?Math.round(rev*cp/100):0;
  var net=rev-totalDep-com;
  return {villa:villa,mois:mois,rev:rev,deps:deps,totalDep:totalDep,cp:cp,com:com,net:net};
}
function buildCard(r){
  if(!r) return '';
  if(!r.deps) r.deps=[];
  if(!r.net) r.net = (r.rev||0)-(r.totalDep||0)-(r.com||0);
  var nc=r.net>=0?'#4ade80':'#f87171';
  var ns=(r.net>=0?'+':'')+fmt(r.net);
  var rows='';
  if(r.rev>0) rows+='<div class="rr"><span>Revenus totaux</span><span>'+fmt(r.rev)+'</span></div>';
  r.deps.forEach(function(d){rows+='<div class="rr"><span>'+d.n.charAt(0).toUpperCase()+d.n.slice(1)+'</span><span class="rn">−'+fmt(d.v)+'</span></div>';});
  if(r.com>0) rows+='<div class="rr"><span>Commission '+r.cp+'%</span><span class="rn">−'+fmt(r.com)+'</span></div>';
  rows+='<div class="rr"><span>'+(r.net>=0?'BÉNÉFICE NET':'DÉFICIT NET')+'</span><span style="color:'+nc+'">'+ns+'</span></div>';
  var rid='rpt_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
  window._rapports = window._rapports||{};
  window._rapports[rid] = r;
  return '<div class="rc"><div class="rct">📊 '+r.villa+' · '+r.mois+'</div>'+rows+'<div class="rb"><button class="rbtn g" id="'+rid+'_btn" onclick="genPDF(this,\''+rid+'\')" style="width:100%;border-radius:6px;">📄 Télécharger PDF</button></div></div>';
}
function getReply(txt){
  var type=analyzeMsg(txt);
  if(type==='salut') return {d:500,m:'Bonjour ! 👋 Envoyez-moi les chiffres de vos villas et je génère vos rapports. Besoin d\'aide ? Tapez <em>"aide"</em>.'};
  if(type==='merci') return {d:400,m:'Avec plaisir ! 🙏 N\'hésitez pas si vous avez d\'autres villas à traiter.'};
  if(type==='aide') return {d:600,m:'Voici comment je fonctionne :<br><br>📨 <strong>Rapport mensuel</strong><br><em>Nom villa, mois : Airbnb X séjours X ฿, électricité X ฿, eau X ฿, ménage X ฿, commission X%</em><br><br>⚡ <strong>Dépenses imprévues</strong> → bouton Divers ci-dessous<br>✏️ <strong>Corriger</strong> → renvoyez les données corrigées'};
  if(type==='ajout'){return {d:500,m:'Pour ajouter une villa, rendez-vous sur le <strong>Dashboard</strong> et appuyez sur <strong>＋ Ajouter une villa</strong> 🏠'};};
  if(type==='correction') return {d:500,m:'✏️ Pas de problème ! Renvoyez-moi les données complètes et corrigées, je régénère le rapport immédiatement.'};
  if(type==='bilan'){var y=(txt.match(/20\d\d/)||['2025'])[0];return {d:800,m:'📅 Pour votre <strong>bilan annuel '+y+'</strong>, contactez ACS :<br><br>📱 +66 91 333 9323<br>✉️ acsconcierge.pro@gmail.com<br><br>Demandez votre bilan annuel directement à votre gestionnaire ACS.'};};
  if(type==='rapport_ok'){
    var r=parseData(txt);
    if(r.rev>0){
      addToHistory(r);
      return {d:1400,m:'Rapport généré 🎉'+buildCard(r), rapport:r};
    }
    return {d:800,m:'Données reçues mais montants illisibles.<br><em>Format : Villa X, mars : Airbnb 5 séjours 150000 ฿, eau 1500 ฿, commission 20%</em>'};
  };
  if(type==='rapport_incomplet'){
    var r=parseData(txt);
    if(r.rev>0&&r.cp===0) return {d:700,m:'Données de <strong>'+r.villa+'</strong> reçues ✅<br><br>Il manque le <strong>taux de commission</strong> (ex: 20%). Renvoyez avec cette info !'};
    if(r.rev>0&&r.cp>0){ addToHistory(r); return {d:1200,m:'Rapport généré 🎉'+buildCard(r),rapport:r}; }
    return {d:700,m:'Données de <strong>'+r.villa+'</strong> reçues 📋<br><br>Il me manque les <strong>revenus</strong> (ex: Airbnb 5 séjours 150 000 ฿) et/ou le <strong>taux de commission</strong>.<br>Renvoyez le message complet !'};
  };
  return {d:700,m:'Je n\'ai pas bien compris 🤔<br><br>Essayez :<br><em>Villa Nom, mois : Airbnb X séjours X ฿, pisciniste X ฿, eau X ฿, commission X%</em>'};
}

  const periode = mois+' '+annee;
  closeMov();
  goPage('chat');

  const allReports = [];

  CU.villas.forEach(function(v, vi){
    const air = parseFloat(document.getElementById('d'+vi+'_air')?document.getElementById('d'+vi+'_air').value:0)||0;
    const bk  = parseFloat(document.getElementById('d'+vi+'_bk') ?document.getElementById('d'+vi+'_bk').value:0)||0;
    const el  = parseFloat(document.getElementById('d'+vi+'_el') ?document.getElementById('d'+vi+'_el').value:0)||0;
    const eau = parseFloat(document.getElementById('d'+vi+'_eau')?document.getElementById('d'+vi+'_eau').value:0)||0;
    const men = parseFloat(document.getElementById('d'+vi+'_men')?document.getElementById('d'+vi+'_men').value:0)||0;
    const div = parseFloat(document.getElementById('d'+vi+'_div')?document.getElementById('d'+vi+'_div').value:0)||0;
    const cp  = parseFloat(document.getElementById('d'+vi+'_com')?document.getElementById('d'+vi+'_com').value:v.comPct||20)||20;
    const rev = air + bk;
    if(rev===0) return;

    // Charges fixes de la villa — seulement pisciniste, jardinier, internet
    const FIXED_KEYS = ['pisciniste','jardinier','internet'];
    const fixedDeps = v.charges
      ? Object.entries(v.charges)
          .filter(function(e){ return FIXED_KEYS.includes(e[0].toLowerCase()); })
          .map(function(e){ return {n:e[0].charAt(0).toUpperCase()+e[0].slice(1),v:e[1]}; })
      : [];
    // Charges variables
    const varDeps = [];
    if(el>0)  varDeps.push({n:'Électricité',v:el});
    if(eau>0) varDeps.push({n:'Eau',v:eau});
    if(men>0) varDeps.push({n:'Ménage',v:men});
    if(div>0) varDeps.push({n:'Divers',v:div});

    const allDeps = fixedDeps.concat(varDeps);
    const totalDep = allDeps.reduce(function(s,d){return s+d.v;},0);
    const com = Math.round(rev * cp / 100);
    const net = rev - totalDep - com;

    const r = {villa:v.name, mois:periode, rev:rev, deps:allDeps, totalDep:totalDep, cp:cp, com:com, net:net, client:CU?CU.name:''};
    allReports.push(r);
    addToHistory(r);
  });

  if(allReports.length===0){
    setTimeout(function(){
      addBot('⚠️ Aucun revenu déclaré. Remplissez au moins Airbnb ou Booking pour une villa.');
    },300);
    return;
  }

  addUser('📋 Déclaration '+periode+' — '+allReports.length+' villa'+(allReports.length>1?'s':''));

  setTimeout(function(){
    let html='✅ Déclaration <strong>'+periode+'</strong> traitée !<br>';
    html+='<span style="font-size:.75rem;color:var(--gris);">Cliquez sur l\'onglet Rapports pour télécharger vos PDF.</span><br><br>';
    allReports.forEach(function(r){ html+=buildCard(r); });
    addBot(html);
    saveChatHistory();
    buildClient(); // Rafraîchir historique
  },600);
}

// ══ APPEL CLAUDE API ══
function callClaude(userMsg, typingEl){
  var apiKey = getApiKey();
  // Construire contexte villas
  var villasCtx = '';
  if(CU && CU.villas && CU.villas.length>0){
    villasCtx = '\n\nVillas du client :\n';
    CU.villas.forEach(function(v){
      villasCtx += '- '+v.name;
      if(v.charges){
        var ch=Object.entries(v.charges).map(function(e){ return e[0]+': '+e[1]+' ฿'; }).join(', ');
        if(ch) villasCtx += ' (charges fixes: '+ch+')';
      }
      if(v.comPct) villasCtx += ' (commission: '+v.comPct+'%)';
      villasCtx += '\n';
    });
  }

  var systemPrompt = `Tu es l'assistant ACS (Accounting Concierge Services), expert en comptabilité de villas de location à Koh Samui, Thaïlande.

TON RÔLE :
- Analyser les données financières des villas envoyées par le client
- Générer des rapports mensuels précis : revenus, dépenses, commission ACS, bénéfice net
- Répondre en français, de façon claire et professionnelle
- Être flexible sur l'orthographe et le format — comprendre même les messages approximatifs

FORMAT DE RÉPONSE POUR UN RAPPORT :
Quand l'utilisateur envoie des chiffres (revenus Airbnb, dépenses, commission), réponds TOUJOURS avec ce JSON exact en plus de ton texte :
<RAPPORT>{"villa":"NOM","mois":"MOIS ANNÉE","rev":MONTANT,"deps":[{"n":"NOM_DEPENSE","v":MONTANT}],"totalDep":TOTAL,"cp":TAUX_COM,"com":MONTANT_COM,"net":BENEFICE_NET}</RAPPORT>

RÈGLES :
- Les montants sont en bahts thaïlandais (฿)
- Commission ACS = % des revenus BRUTS
- Bénéfice net = revenus - dépenses - commission
- Si données manquantes, demande UNIQUEMENT ce qui manque (revenus OU commission)
- Sois bref et direct, max 3-4 lignes de texte
- Vouvoyer le client
${villasCtx}`;

  // Construire historique messages (5 derniers)
  var msgs = [];
  document.querySelectorAll('#chatmsgs .msg').forEach(function(el){
    if(el.querySelector('.tdots')) return; // skip typing
    var role = el.classList.contains('usr') ? 'user' : 'assistant';
    var text = el.querySelector('.bb').innerText || el.querySelector('.bb').textContent;
    if(text.trim()) msgs.push({role:role, content:text.trim()});
  });
  // Garder les 8 derniers + message actuel
  if(msgs.length>8) msgs=msgs.slice(msgs.length-8);
  msgs.push({role:'user', content:userMsg});

  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key': apiKey,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body: JSON.stringify({
      model:'claude-haiku-4-5-20251001',
      max_tokens:1024,
      system: systemPrompt,
      messages: msgs
    })
  })
  .then(function(res){ return res.json(); })
  .then(function(data){
    typingEl.remove();
    if(data.error){ addBot('❌ Erreur API : '+data.error.message); return; }
    var text = data.content && data.content[0] ? data.content[0].text : 'Pas de réponse.';

    // Détecter un rapport JSON dans la réponse
    var rapportMatch = text.match(/<RAPPORT>([\s\S]*?)<\/RAPPORT>/);
    if(rapportMatch){
      try{
        var r = JSON.parse(rapportMatch[1]);
        // Calculer les manquants
        if(!r.totalDep) r.totalDep = r.deps ? r.deps.reduce(function(s,d){return s+d.v;},0) : 0;
        if(!r.com && r.cp && r.rev) r.com = Math.round(r.rev * r.cp / 100);
        if(!r.net) r.net = r.rev - r.totalDep - (r.com||0);
        r.pos = r.net >= 0;
        // Ajouter à l'historique
        addToHistory(r);
        // Texte sans le JSON
        var cleanText = text.replace(/<RAPPORT>[\s\S]*?<\/RAPPORT>/g,'').trim();
        var msg = (cleanText ? '<p>'+cleanText+'</p>' : '') + buildCard(r);
        addBot(msg);
      }catch(e){
        addBot(text.replace(/<RAPPORT>[\s\S]*?<\/RAPPORT>/g,'').trim());
      }
    } else {
      // Réponse normale — formater le texte
      var html = text
        .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
        .replace(/\n\n/g,'<br><br>')
        .replace(/\n/g,'<br>');
      addBot(html);
    }
    saveChatHistory();
  })
  .catch(function(err){
    typingEl.remove();
    addBot('❌ Erreur de connexion. Vérifiez votre clé API dans Profil → Réglages admin.');
    console.error('Claude API error:', err);
  });
}

// ══ AJOUTER RAPPORT À L'HISTORIQUE ══
function addToHistory(r){
  if(!CU) return;
  // Trouver l'ID client même si CU.id pas défini
  var cid = CU.id || localStorage.getItem('acs_last_id');
  if(!cid || !CLIENTS[cid]) return;
  const entry={
    id: 'h_'+Date.now(),
    name: r.villa,
    period: r.mois,
    net: r.net,
    pos: r.net>=0,
    rev: r.rev,
    dep: r.totalDep||0,
    com: r.com||0,
    details: r,
    client: CU ? CU.name : '',
    date: new Date().toLocaleDateString('fr-FR')
  };
  if(!CLIENTS[cid].history) CLIENTS[cid].history=[];
  // Éviter doublons (même villa + même mois)
  const exists = CLIENTS[cid].history.find(function(h){ return h.name===r.villa && h.period===r.mois; });
  if(!exists){
    CLIENTS[cid].history.unshift(entry);
    save('clients', CLIENTS);
    // Recharger CU avec les nouvelles données
    CU = {...CLIENTS[cid], id:cid};
    // Reconstruire l'interface
    buildClient();
    showToast('📋 Rapport ajouté à l\'historique !');
  }
}

// ══ GÉNÉRATION PDF RÉELLE ══
function genPDF(btn, rid){
  var r = (typeof rid==='string') ? (window._rapports && window._rapports[rid]) : rid;
  if(!r){ showToast('❌ Rapport introuvable'); return; }
  if(!window.jspdf){
    showToast('⏳ Chargement PDF...');
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s.onload=function(){ genPDF(btn,rid); };
    document.head.appendChild(s); return;
  }
  try {
    if(!r.deps) r.deps=[];
    var jsPDF=window.jspdf.jsPDF;
    var doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    var W=210, mg=16, y=0;

    // ── PALETTE ──
    var NOIR   = [8,8,8];
    var NOIR2  = [18,18,18];
    var NOIR3  = [26,26,26];
    var OR     = [201,149,12];
    var OR3    = [245,208,107];
    var BLANC  = [242,242,242];
    var GRIS   = [120,120,120];
    var ROUGE  = [220,60,60];
    var VERT   = [74,222,128];

    // ── FOND PAGE ──
    doc.setFillColor.apply(doc, NOIR2);
    doc.rect(0,0,W,297,'F');

    // ── HEADER BAND ──
    doc.setFillColor.apply(doc, NOIR);
    doc.rect(0,0,W,52,'F');

    // Ligne déco or gauche
    doc.setFillColor.apply(doc, OR);
    doc.rect(0,0,3,52,'F');

    // Logo ACS
    doc.setFont('helvetica','bold');
    doc.setFontSize(32);
    doc.setTextColor.apply(doc, OR3);
    doc.text('ACS',mg+4,22);

    // Tagline
    doc.setFont('helvetica','normal');
    doc.setFontSize(7);
    doc.setTextColor.apply(doc, GRIS);
    doc.text('ACCOUNTING CONCIERGE SERVICES',mg+4,30);

    // Ligne séparatrice verticale
    doc.setDrawColor.apply(doc, OR);
    doc.setLineWidth(0.3);
    doc.line(75,8,75,44);

    // Infos rapport à droite du séparateur
    doc.setFont('helvetica','bold');
    doc.setFontSize(14);
    doc.setTextColor.apply(doc, BLANC);
    doc.text(String(r.villa||'Villa'), 82, 20);
    doc.setFont('helvetica','normal');
    doc.setFontSize(9);
    doc.setTextColor.apply(doc, OR3);
    doc.text(String(r.mois||''), 82, 28);
    doc.setFontSize(7);
    doc.setTextColor.apply(doc, GRIS);
    doc.text('Rapport généré le '+new Date().toLocaleDateString('fr-FR'), 82, 36);

    // Badge statut net
    var netPos = (r.net||0)>=0;
    doc.setFillColor.apply(doc, netPos ? [20,60,30] : [60,15,15]);
    doc.roundedRect(W-mg-38,10,36,14,2,2,'F');
    doc.setDrawColor.apply(doc, netPos ? VERT : ROUGE);
    doc.setLineWidth(0.4);
    doc.roundedRect(W-mg-38,10,36,14,2,2,'S');
    doc.setFont('helvetica','bold');
    doc.setFontSize(7);
    doc.setTextColor.apply(doc, netPos ? VERT : ROUGE);
    doc.text(netPos ? 'BÉNÉFICE' : 'DÉFICIT', W-mg-20,17,{align:'center'});
    doc.setFontSize(10);
    doc.text((netPos?'+ ':'')+fmtPDFb(r.net||0), W-mg-20,25,{align:'center'});

    // Ligne or bas header
    doc.setDrawColor.apply(doc, OR);
    doc.setLineWidth(0.6);
    doc.line(0,52,W,52);

    y=64;

    // ── SECTION REVENUS ──
    function sectionTitle(title, yy){
      doc.setFont('helvetica','bold');
      doc.setFontSize(7);
      doc.setTextColor.apply(doc, OR);
      doc.text(title.toUpperCase(), mg, yy);
      doc.setDrawColor.apply(doc, OR);
      doc.setLineWidth(0.2);
      doc.line(mg+doc.getTextWidth(title.toUpperCase())+2, yy-0.5, W-mg, yy-0.5);
      return yy+6;
    }

    var COL_VAL = W - mg - 4; // colonne droite fixe
    function tableRow(label, valeur, bold, colorLeft, colorRight, bg){
      var rowH = 10;
      if(bg){
        doc.setFillColor.apply(doc, bg);
        doc.rect(mg, y-4, W-2*mg, rowH, 'F');
      }
      // Label à gauche
      doc.setFont('helvetica', bold?'bold':'normal');
      doc.setFontSize(bold?10:9);
      doc.setTextColor.apply(doc, colorLeft||BLANC);
      var maxLabelW = COL_VAL - mg - 50; // espace pour le label
      var labelStr = String(label);
      // Tronquer si trop long
      while(doc.getTextWidth(labelStr) > maxLabelW && labelStr.length > 3){
        labelStr = labelStr.slice(0, -1);
      }
      if(labelStr !== String(label)) labelStr += '..';
      doc.text(labelStr, mg+3, y+2);
      // Valeur à droite, alignée
      doc.setFont('helvetica', bold?'bold':'normal');
      doc.setFontSize(bold?10:9);
      doc.setTextColor.apply(doc, colorRight||BLANC);
      doc.text(String(valeur), COL_VAL, y+2, {align:'right'});
      if(!bold){
        doc.setDrawColor(40,40,40);
        doc.setLineWidth(0.1);
        doc.line(mg, y+rowH-4, W-mg, y+rowH-4);
      }
      y += rowH;
    }

    // Revenus
    y = sectionTitle('Revenus', y);
    tableRow('Airbnb, Booking, Location', fmtPDFb(r.rev||0), false, BLANC, OR3);
    y+=3;

    // Séparation charges fixes / variables
    var PDF_FIXES = ['pisciniste','jardinier','internet'];
    var varDeps = r.deps ? r.deps.filter(function(d){ return !PDF_FIXES.includes(d.n.toLowerCase()); }) : [];
    var fixDeps = r.deps ? r.deps.filter(function(d){ return PDF_FIXES.includes(d.n.toLowerCase()); }) : [];

    if(varDeps.length>0){
      y = sectionTitle('Charges variables', y);
      varDeps.forEach(function(d){
        tableRow(d.n.charAt(0).toUpperCase()+d.n.slice(1), '- '+fmtPDFb(d.v||0), false, BLANC, ROUGE);
      });
      y+=3;
    }

    // Charges fixes
    if(fixDeps.length>0){
      y = sectionTitle('Charges fixes', y);
      fixDeps.forEach(function(d){
        tableRow(d.n.charAt(0).toUpperCase()+d.n.slice(1), '- '+fmtPDFb(d.v||0), false, BLANC, ROUGE);
      });
      y+=3;
    }

    // Commission
    if((r.com||0)>0){
      var clientLabel = r.client || (CU ? CU.name : '') || 'ACS';
      y = sectionTitle('Commission ' + clientLabel, y);
      tableRow('Commission ' + r.cp + '% des revenus bruts', '- ' + fmtPDFb(r.com||0), false, BLANC, ROUGE);
      y+=3;
    }

    // ── TOTAL NET ──
    y+=2;
    doc.setFillColor.apply(doc, netPos ? [12,35,18] : [40,10,10]);
    doc.roundedRect(mg,y-4,W-2*mg,14,2,2,'F');
    doc.setDrawColor.apply(doc, netPos ? VERT : ROUGE);
    doc.setLineWidth(0.5);
    doc.roundedRect(mg,y-4,W-2*mg,14,2,2,'S');
    doc.setFont('helvetica','bold');
    doc.setFontSize(12);
    doc.setTextColor.apply(doc, netPos ? VERT : ROUGE);
    doc.text(netPos ? 'BÉNÉFICE NET' : 'DÉFICIT NET', mg+4, y+5);
    doc.text((netPos?'+ ':'')+fmtPDFb(r.net||0), W-mg-4, y+5, {align:'right'});
    y+=22;

    // ── RÉCAP RAPIDE ──
    var boxW=(W-2*mg-8)/3;
    function miniBox(label, val, col, bx){
      doc.setFillColor.apply(doc, NOIR3);
      doc.roundedRect(bx,y,boxW,16,2,2,'F');
      doc.setFont('helvetica','bold');
      doc.setFontSize(8.5);
      doc.setTextColor.apply(doc, col||OR3);
      doc.text(String(val), bx+boxW/2, y+7, {align:'center'});
      doc.setFont('helvetica','normal');
      doc.setFontSize(6.5);
      doc.setTextColor.apply(doc, GRIS);
      doc.text(label, bx+boxW/2, y+13, {align:'center'});
    }
    miniBox('Revenus bruts', fmtPDFb(r.rev||0), OR3, mg);
    miniBox('Total charges', fmtPDFb((r.totalDep||0)+(r.com||0)), ROUGE, mg+boxW+4);
    miniBox('Résultat net', (netPos?'+ ':'')+fmtPDFb(r.net||0), netPos?VERT:ROUGE, mg+2*(boxW+4));
    y+=24;

    // ── FOOTER ──
    doc.setFillColor.apply(doc, NOIR);
    doc.rect(0,272,W,25,'F');
    doc.setDrawColor.apply(doc, OR);
    doc.setLineWidth(0.3);
    doc.line(0,272,W,272);
    // Ligne or déco gauche
    doc.setFillColor.apply(doc, OR);
    doc.rect(0,272,3,25,'F');
    doc.setFont('helvetica','bold');
    doc.setFontSize(8);
    doc.setTextColor.apply(doc, OR3);
    doc.text('ACS — Accounting Concierge Services', mg+4, 281);
    doc.setFont('helvetica','normal');
    doc.setFontSize(7);
    doc.setTextColor.apply(doc, GRIS);
    doc.text('acsconcierge.pro@gmail.com  |  +66 91 333 9323  |  Koh Samui, Thaïlande', mg+4, 288);
    doc.setTextColor.apply(doc, [60,60,60]);
    doc.text('Document confidentiel — généré automatiquement', W-mg, 288, {align:'right'});

    // Sauvegarder
    var fname='ACS_'+(r.villa||'Rapport').replace(/\s+/g,'_')+'_'+(r.mois||'').replace(/\s+/g,'_')+'.pdf';
    doc.save(fname);
    showToast('✅ PDF téléchargé !');
    if(btn){ btn.textContent='✅ Téléchargé'; btn.style.opacity='0.7'; setTimeout(function(){ btn.textContent='📄 Télécharger PDF'; btn.style.opacity='1'; },3000); }
  } catch(e){
    console.error('PDF error',e);
    showToast('❌ Erreur PDF : '+e.message);
  }
}

// ══ HISTORIQUE ══
function buildRapportFromHistory(x){
  var details = x.details || {};
  return {
    villa  : x.name   || details.villa   || 'Villa',
    mois   : x.period || details.mois    || '',
    rev    : x.rev    || details.rev     || 0,
    deps   : details.deps || [],
    totalDep: x.dep   || details.totalDep|| 0,
    cp     : x.com && x.rev ? Math.round(x.com/x.rev*100) : (details.cp||20),
    com    : x.com    || details.com     || 0,
    net    : x.net    || details.net     || 0,
    client : x.client || details.client  || (CU ? CU.name : '')
  };
}

function histItem(x){
  if(!x) return '';
  const rapport = buildRapportFromHistory(x);
  const pos = rapport.net >= 0;

  // Stocker dans window._rapports avec un ID stable basé sur villa+période
  const rid = 'H_'+(rapport.villa+'_'+rapport.mois).replace(/[^a-zA-Z0-9]/g,'_');
  window._rapports = window._rapports || {};
  window._rapports[rid] = rapport;
  x._rid = rid;

  return '<div class="hi" onclick="genPDF(this,\''+rid+'\')" style="cursor:pointer;transition:all .18s;" '
    +'onmouseover="this.style.background=\'rgba(201,149,12,.09)\';this.style.borderColor=\'rgba(201,149,12,.4)\';" '
    +'onmouseout="this.style.background=\'\';this.style.borderColor=\'\';">'
    +'<div class="hico">🏠</div>'
    +'<div style="flex:1;min-width:0;">'
      +'<div class="hin">'+rapport.villa+'</div>'
      +'<div class="him">'+rapport.mois+'</div>'
      +(rapport.rev>0?'<div style="font-size:.65rem;color:var(--gris);margin-top:.15rem;">Revenus : '+fmt(rapport.rev)+'</div>':'')
    +'</div>'
    +'<div class="hr2" style="align-items:flex-end;">'
      +'<div class="ha" style="color:'+(pos?'#4ade80':'#f87171')+';margin-bottom:.25rem;">'+(pos?'+ ':'')+fmt(rapport.net)+'</div>'
      +'<div style="font-size:.62rem;color:var(--or3);font-weight:600;letter-spacing:.04em;">↓ PDF</div>'
    +'</div>'
    +'</div>';
}

// ══ UTILS ══
function fmt(v){
  const n = Math.abs(Math.round(v||0));
  return n.toLocaleString('fr-FR')+' ฿';
}
function fmtPDF(v){
  // Formatage manuel pour jsPDF (evite le separateur non-breakable de fr-FR)
  var n = Math.abs(Math.round(v||0));
  var s = String(n).replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
  return s + ' THB';
}
function fmtPDFb(v){
  // Avec signe baht pour les cellules
  var n = Math.abs(Math.round(v||0));
  var s = String(n).replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
  return s + ' ฿';
}
function now(){const d=new Date();return `${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;}
function aR(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,85)+'px';}

function showToast(msg){const el=document.getElementById('toastel');el.textContent=msg;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2300);}

let diversCount=0;
function addDiversLine(){
  diversCount++;
  const div=document.createElement('div');
  div.style.cssText='display:flex;gap:.5rem;margin-bottom:.5rem;align-items:center;';
  div.innerHTML=`<input class="form-input" placeholder="Description (ex: réparation clim)" id="div-desc-${diversCount}" style="flex:2;">
    <input class="form-input" placeholder="Montant ฿" id="div-amt-${diversCount}" type="number" style="flex:1;">
    <button onclick="this.parentNode.remove()" style="background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.3);color:#f87171;border-radius:6px;padding:.5rem .7rem;cursor:pointer;font-size:.85rem;">✕</button>`;
  document.getElementById('divers-list').appendChild(div);
}
function saveDivers(){
  const items=[];
  document.querySelectorAll('[id^="div-desc-"]').forEach(el=>{
    const i=el.id.split('-')[2];
    const desc=el.value.trim();
    const amt=parseFloat(document.getElementById('div-amt-'+i).value)||0;
    if(desc&&amt>0) items.push({desc,amt});
  });
  if(!items.length){showToast('⚠️ Remplissez au moins une dépense');return;}

  // Récupérer la villa sélectionnée dans le modal divers
  const villaSelect = document.getElementById('divers-villa-select');
  const villaName = villaSelect ? villaSelect.value : (CU&&CU.villas&&CU.villas[0]?CU.villas[0].name:'');

  closeMov();
  diversCount=0;

  const total=items.reduce((s,x)=>s+x.amt,0);

  // Chercher le dernier rapport de cette villa dans l'historique pour le mettre à jour
  const cid = CU.id || localStorage.getItem('acs_last_id');
  let rapportMisAJour = null;
  if(cid && CLIENTS[cid] && CLIENTS[cid].history){
    // Trouver le rapport le plus récent de cette villa
    const found = CLIENTS[cid].history.find(function(h){ return h.name===villaName; });
    if(found){
      // Ajouter les nouvelles dépenses au rapport
      if(!found.details) found.details = {villa:found.name,mois:found.period,rev:found.rev||0,deps:[],totalDep:found.dep||0,cp:found.com&&found.rev?Math.round(found.com/found.rev*100):20,com:found.com||0,net:found.net||0};
      if(!found.details.deps) found.details.deps=[];
      items.forEach(function(it){ found.details.deps.push({n:it.desc,v:it.amt}); });
      found.details.totalDep = (found.details.totalDep||0)+total;
      found.details.net = (found.details.rev||0)-(found.details.totalDep||0)-(found.details.com||0);
      found.net = found.details.net;
      found.dep = found.details.totalDep;
      // Sauvegarder
      save('clients',CLIENTS);
      rapportMisAJour = found.details;
      // Mettre à jour dans window._rapports
      const key='hist_'+(found.name+'_'+found.period).replace(/\s+/g,'_');
      window._rapports = window._rapports||{};
      window._rapports[key] = rapportMisAJour;
      if(found._rid) window._rapports[found._rid] = rapportMisAJour;
    }
  }

  const liste=items.map(x=>'• '+x.desc+' : '+fmt(x.amt)).join('\n');
  addUser('Dépenses diverses ('+villaName+') :\n'+liste+'\nTotal : '+fmt(total));

  setTimeout(function(){
    const ridNew='div_'+Date.now();
    window._rapports = window._rapports||{};
    if(rapportMisAJour) window._rapports[ridNew]=rapportMisAJour;

    let html='✅ Dépenses diverses enregistrées — <strong>'+fmt(total)+'</strong> déduits.'
      +'<div class="rc"><div class="rct">⚡ Dépenses diverses — '+villaName+'</div>'
      +items.map(function(x){return '<div class="rr"><span>'+x.desc+'</span><span class="rn">−'+fmt(x.amt)+'</span></div>';}).join('')
      +'<div class="rr"><span>TOTAL DIVERS</span><span class="rn">−'+fmt(total)+'</span></div>';

    if(rapportMisAJour){
      html+='<div class="rr" style="border-top:1px solid rgba(201,149,12,.2);margin-top:.3rem;padding-top:.3rem;">'
        +'<span style="color:var(--or3);font-weight:600;">Bénéfice net mis à jour</span>'
        +'<span style="color:'+(rapportMisAJour.net>=0?'#4ade80':'#f87171')+';font-weight:700;">'+(rapportMisAJour.net>=0?'+ ':'')+fmt(rapportMisAJour.net)+'</span></div>';
      html+='<div class="rb"><button class="rbtn g" onclick="genPDF(this,\''+ridNew+'\')" style="width:100%;border-radius:6px;">📄 Télécharger PDF mis à jour</button></div>';
    }
    html+='</div>';
    addBot(html);
    saveChatHistory();
    // Rafraîchir l'historique
    buildClient();
  },800);
}

// ══ SERVICE WORKER + NOTIFICATIONS PUSH 19H ══
let swReg = null;

function initNotifications(){
  if(!('serviceWorker' in navigator) || !('Notification' in window)) return;
  navigator.serviceWorker.register('./sw.js').then(reg => {
    swReg = reg;
    console.log('[ACS] Service Worker enregistré');
    if(Notification.permission === 'granted') {
      sendScheduleToSW();
    } else if(Notification.permission === 'default') {
      setTimeout(() => {
        Notification.requestPermission().then(p => {
          if(p === 'granted') sendScheduleToSW();
        });
      }, 2500);
    }
  }).catch(e => console.log('[ACS] SW error:', e));
}

function sendScheduleToSW() {
  const villas = CU && CU.villas ? CU.villas.map(v => v.name) : [];
  navigator.serviceWorker.ready.then(reg => {
    reg.active && reg.active.postMessage({
      type: 'SCHEDULE_19H',
      villaNames: villas,
      userName: CU ? CU.name : ''
    });
  });
}

function testNotif(){
  if(!('serviceWorker' in navigator)){showToast('❌ Non supporté sur ce navigateur');return;}
  if(Notification.permission === 'granted'){
    const villas = CU && CU.villas ? CU.villas.map(v => v.name) : ['votre villa'];
    navigator.serviceWorker.ready.then(reg => {
      reg.active && reg.active.postMessage({
        type: 'TEST_NOTIF',
        villaNames: villas,
        userName: CU ? CU.name : ''
      });
    });
    showToast('🔔 Notification test envoyée !');
  } else if(Notification.permission === 'default'){
    Notification.requestPermission().then(p => {
      if(p === 'granted'){ sendScheduleToSW(); showToast('✅ Notifications activées !'); }
      else showToast('❌ Notifications refusées — activez dans les réglages');
    });
  } else {
    showToast('❌ Bloquées — activez dans Réglages > Safari/Chrome > Notifications');
  }
}

function saveEmailAndContinue(id) {
  const email = document.getElementById('ec-email').value.trim();
  if(!email || !email.includes('@')) { 
    document.getElementById('ec-email').style.borderColor='var(--rouge)';
    return; 
  }
  try { 
    localStorage.setItem('acs_email_'+id, email);
    localStorage.setItem('acs_email_done_'+id, '1'); // flag 1ère connexion terminée
    sessionStorage.setItem('acs_session', id);
  } catch(e) {}
  if(CLIENTS[id]) { CLIENTS[id].email = email; save('clients', CLIENTS); }
  removeEmailCapture();
  initApp();
}

function skipEmailCapture() {
  // Marquer comme vu même si skippé — ne plus redemander
  const id = localStorage.getItem('acs_last_id') || '';
  if(id) localStorage.setItem('acs_email_done_'+id, '1');
  removeEmailCapture();
  initApp();
}

function removeEmailCapture() {
  const el = document.getElementById('email-capture');
  if(el) el.remove();
  document.getElementById('login').style.display = '';
}

function applyNewPin(id, newPin) {
  CLIENTS = load('clients', DEFAULT_CLIENTS);
  if(id && CLIENTS[id]) {
    CLIENTS[id].pin = String(newPin);
    save('clients', CLIENTS);
    // Effacer la session pour forcer reconnexion
    try{ sessionStorage.removeItem('acs_session'); }catch(e){}
    closeMov();
    showToast('✅ PIN changé : ' + newPin + ' — Connectez-vous avec ce nouveau PIN');
    pin=''; updDots();
  } else {
    closeMov();
    showToast('❌ Impossible de modifier — contactez ACS');
  }
}

function resetPinWithEmail(id, newPin) {
  const email = document.getElementById('rp-email').value.trim();
  if(!email || !email.includes('@')) { showToast('⚠️ Email invalide'); return; }
  try { localStorage.setItem('acs_email_'+id, email); } catch(e) {}
  if(CLIENTS[id]) { CLIENTS[id].email = email; CLIENTS[id].pin = newPin; save('clients', CLIENTS); }
  closeMov();
  showToast('✅ Nouveau PIN : ' + newPin + ' — Reconnectez-vous');
  pin=''; updDots();
}

function clearSavedId(){
  try{localStorage.removeItem('acs_last_id');}catch(e){}
  document.getElementById('lid').value='';
}
